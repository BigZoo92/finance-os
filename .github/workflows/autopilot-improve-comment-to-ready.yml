name: Autopilot - Improve Codex reply to ready

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: autopilot-improve-comment-ready-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    if: >
      github.event.issue.pull_request == null &&
      (
        contains(github.event.comment.user.login, 'codex') ||
        github.event.comment.user.login == 'chatgpt-codex-connector' ||
        github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;
            const comment = context.payload.comment;

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const issue = live.data;
            const labels = (issue.labels || []).map((l) =>
              typeof l === "string" ? l : l.name
            );
            const has = (n) => labels.includes(n);
            const title = String(issue.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;
            if (has("ready")) return;
            if (!/^\s*status:\s*ready\b/im.test(String(comment?.body || ""))) return;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: "ready" });
            } catch (e) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: "ready",
                  color: "0e8a16",
                  description: "Ready for next stage",
                });
              } catch {}
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ["ready"],
            });
