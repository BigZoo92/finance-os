name: Autopilot - Batch Codex reply -> spawn spec issues

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: autopilot-batch-spawn-specs-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  spawn_specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;
            const comment = context.payload.comment;

            if (payloadIssue.pull_request) return;

            function isCodexAuthor(login) {
              const value = String(login || "").toLowerCase();
              return (
                value === "codex" ||
                value === "codex[bot]" ||
                value === "chatgpt-codex-connector" ||
                value === "chatgpt-codex-connector[bot]"
              );
            }

            if (!isCodexAuthor(comment?.user?.login)) return;

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const issue = live.data;
            const labels = (issue.labels || []).map((l) =>
              typeof l === "string" ? l : l.name
            );
            const has = (n) => labels.includes(n);

            if (!has("batch:spec")) return;
            if (!has("autopilot")) return;
            if (!has("autopilot:waiting-json")) return;
            if (has("autopilot:spawned-specs")) return;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            const labelMeta = {
              "autopilot:waiting-json": ["d4c5f9", "Batch: waiting for Codex JSON response"],
              "autopilot:spawned-specs": ["c8f2c2", "Batch: spec issues have been spawned"],
              "autopilot:retried": ["ffe8a3", "Batch: Codex JSON retry already requested"],
              "needs:you": ["d93f0b", "Human attention required"],
              "agent:pm": ["0e8a16", "PM role"],
              "breakpoint": ["5319e7", "Requires staged approvals"],
              "autopilot": ["1d76db", "Autopilot-managed issue"],
              "ready": ["0e8a16", "Ready for next stage"],
              "prio:p0": ["b60205", "Critical priority"],
              "prio:p1": ["d93f0b", "Important priority"],
              "prio:p2": ["fbca04", "Nice to have"],
              "area:api": ["0052cc", "API area"],
              "area:web": ["0366d6", "Web area"],
              "area:worker": ["5319e7", "Worker area"],
              "area:powens": ["1d76db", "Powens area"],
              "area:db": ["6f42c1", "Database area"],
              "area:infra": ["0e8a16", "Infrastructure area"],
              "area:ui-ux": ["c5def5", "UI/UX area"],
              "area:docs": ["bfdadc", "Documentation area"],
            };

            for (const [name, [color, description]] of Object.entries(labelMeta)) {
              await ensureLabel(name, color, description);
            }

            async function requestRetry(reason) {
              if (has("autopilot:retried")) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: [
                    `FAILED to parse Codex JSON: ${reason}`,
                    "",
                    "Retry was already requested once. Marking needs:you and stopping automation.",
                  ].join("\n"),
                });

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issue.number,
                  labels: ["needs:you"],
                });

                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issue.number,
                    name: "autopilot:waiting-json",
                  });
                } catch {}
                return;
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ["autopilot:retried"],
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: [
                  "@codex",
                  `FAILED to parse your previous reply: ${reason}`,
                  "Please retry with EXACTLY one ```json``` fenced block and a top-level JSON array.",
                  "No text outside that code fence.",
                ].join("\n"),
              });
            }

            const text = String(comment.body || "");
            const jsonFences = [...text.matchAll(/```json\s*([\s\S]*?)\s*```/gi)];

            if (jsonFences.length !== 1) {
              await requestRetry(`Expected exactly one JSON fence, found ${jsonFences.length}.`);
              return;
            }

            const jsonText = String(jsonFences[0][1] || "").trim();
            if (!jsonText) {
              await requestRetry("JSON fence is empty.");
              return;
            }

            let items;
            try {
              items = JSON.parse(jsonText);
              if (!Array.isArray(items)) {
                throw new Error("Top-level JSON value is not an array.");
              }
            } catch (e) {
              await requestRetry(String(e.message || e));
              return;
            }

            const MAX_ITEMS = 100;
            const originalCount = items.length;
            if (items.length > MAX_ITEMS) items = items.slice(0, MAX_ITEMS);

            const batchBody = String(issue.body || "");
            const areaMatch = batchBody.match(/###\s*Area[\s\S]*?\n([a-z-]+)/i);
            const defaultArea = String(areaMatch?.[1] || "web").trim().toLowerCase();

            const allowedAreas = new Set([
              "api",
              "web",
              "worker",
              "powens",
              "db",
              "infra",
              "ui-ux",
              "docs",
            ]);

            function normalizeArea(input) {
              const area = String(input || "").trim().toLowerCase();
              return allowedAreas.has(area) ? area : defaultArea;
            }

            function normalizePriority(input) {
              const value = String(input || "p2").toLowerCase();
              if (value.includes("p0")) return "p0";
              if (value.includes("p1")) return "p1";
              return "p2";
            }

            function safeTitle(input, fallback) {
              const raw = String(input || "").trim();
              const base = (raw.length ? raw : fallback).replace(/\s+/g, " ").trim();
              if (base.toLowerCase().startsWith("spec:")) return base;
              return `spec: ${base}`;
            }

            items.sort((a, b) => {
              const aExtra = a?.origin === "extra" ? 1 : 0;
              const bExtra = b?.origin === "extra" ? 1 : 0;
              if (aExtra !== bExtra) return aExtra - bExtra;
              const aSource = Number(a?.source_bullet ?? 1e9);
              const bSource = Number(b?.source_bullet ?? 1e9);
              return aSource - bSource;
            });

            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "all",
              per_page: 100,
            });

            function existingKeyFromIssue(itemIssue) {
              if (itemIssue.pull_request) return null;
              if (!String(itemIssue.title || "").toLowerCase().startsWith("spec:")) return null;
              const body = String(itemIssue.body || "");
              if (!body.includes(`Parent batch: #${issue.number}`)) return null;
              const meta = body.match(/Origin:\s*(.+?)\s*\|\s*Source bullet:\s*(.+)/i);
              const origin = String(meta?.[1] || "unknown").trim().toLowerCase();
              const sourceBullet = String(meta?.[2] || "n/a").trim().toLowerCase();
              return `${String(itemIssue.title || "").toLowerCase()}::${origin}::${sourceBullet}`;
            }

            const existingMap = new Map();
            for (const itemIssue of allIssues) {
              const key = existingKeyFromIssue(itemIssue);
              if (key) existingMap.set(key, itemIssue);
            }

            const created = [];
            const failed = [];

            for (const item of items) {
              const area = normalizeArea(item?.area);
              const prio = normalizePriority(item?.priority);
              const title = safeTitle(
                item?.title,
                item?.goal ? String(item.goal).slice(0, 60) : `batch item ${created.length + 1}`
              );
              const origin = String(item?.origin || "unknown").trim();
              const sourceBullet = String(item?.source_bullet ?? "n/a").trim();
              const dedupeKey = `${title.toLowerCase()}::${origin.toLowerCase()}::${sourceBullet.toLowerCase()}`;

              const existing = existingMap.get(dedupeKey);
              if (existing) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: existing.number,
                    labels: ["ready"],
                  });
                } catch {}
                created.push(`#${existing.number} (existing)`);
                continue;
              }

              const body = [
                item?.goal ? `### Goal\n${item.goal}\n` : "",
                item?.non_goals ? `### Non-goals\n${item.non_goals}\n` : "",
                Array.isArray(item?.acceptance_criteria) && item.acceptance_criteria.length
                  ? `### Acceptance criteria\n${item.acceptance_criteria.map((x) => `- ${x}`).join("\n")}\n`
                  : "",
                Array.isArray(item?.breakpoints) && item.breakpoints.length
                  ? `### Breakpoints (BP1/BP2/BP3)\n${item.breakpoints.map((x) => `- ${x}`).join("\n")}\n`
                  : "",
                item?.dual_path ? `### Demo/Admin dual-path\n${item.dual_path}\n` : "",
                item?.observability ? `### Observability\n${item.observability}\n` : "",
                item?.uiux ? `### UI/UX notes\n${item.uiux}\n` : "",
                item?.risks ? `### Risks\n${item.risks}\n` : "",
                `### ENV CHANGE REQUEST\n${item?.env_change_request || "None"}\n`,
                "---",
                `Parent batch: #${issue.number}`,
                `Origin: ${origin} | Source bullet: ${sourceBullet}`,
              ]
                .filter(Boolean)
                .join("\n");

              try {
                const createdIssue = await github.rest.issues.create({
                  owner,
                  repo,
                  title,
                  body,
                  labels: [
                    "agent:pm",
                    "breakpoint",
                    "autopilot",
                    `prio:${prio}`,
                    `area:${area}`,
                  ],
                });

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: createdIssue.data.number,
                  labels: ["ready"],
                });

                created.push(`#${createdIssue.data.number}`);
              } catch (e) {
                failed.push(`${title} (${String(e.message || e)})`);
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ["autopilot:spawned-specs"],
            });

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: "autopilot:waiting-json",
              });
            } catch {}

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: "autopilot:retried",
              });
            } catch {}

            const summary = [
              `Spawned spec issues: ${created.join(", ") || "none"}`,
              originalCount > MAX_ITEMS
                ? `Truncated from ${originalCount} to ${MAX_ITEMS} items.`
                : "",
              failed.length
                ? `Failed to create some issues: ${failed.slice(0, 5).join(" | ")}${failed.length > 5 ? " ..." : ""}`
                : "",
            ]
              .filter(Boolean)
              .join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: summary,
            });
