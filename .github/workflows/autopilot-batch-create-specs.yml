name: Autopilot - Batch Codex reply -> spawn spec issues

on:
    issue_comment:
        types: [created]

permissions:
    issues: write

concurrency:
    group: autopilot-batch-spawn-specs-${{ github.event.issue.number }}
    cancel-in-progress: false

jobs:
    spawn_specs:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const payloadIssue = context.payload.issue;
                      const comment = context.payload.comment;

                      if (payloadIssue.pull_request) return;

                      // Only react to Codex replies, never to our own automation comments.
                      const login = String(comment.user?.login || "").toLowerCase();
                      if (!login.includes("codex")) return;

                      // Always re-fetch the live issue to avoid stale label decisions.
                      const live = await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number: payloadIssue.number,
                      });

                      const issue = live.data;
                      const labels = (issue.labels || []).map((l) =>
                        typeof l === "string" ? l : l.name
                      );
                      const has = (n) => labels.includes(n);

                      if (has("batch:spec") === false) return;
                      if (has("autopilot") === false) return;

                      // Only process when we are explicitly waiting for JSON.
                      if (has("autopilot:waiting-json") === false) return;

                      // Idempotency: do nothing if already spawned.
                      if (has("autopilot:spawned-specs")) return;

                      async function ensureLabel(name, color, description) {
                        try {
                          await github.rest.issues.getLabel({ owner, repo, name });
                        } catch (e) {
                          try {
                            await github.rest.issues.createLabel({
                              owner,
                              repo,
                              name,
                              color,
                              description,
                            });
                          } catch {}
                        }
                      }

                      await ensureLabel("autopilot:waiting-json", "d4c5f9", "Batch: waiting for Codex JSON response");
                      await ensureLabel("autopilot:spawned-specs", "c8f2c2", "Batch: spec issues have been spawned");
                      await ensureLabel("autopilot:retried", "ffe8a3", "Batch: Codex JSON retry already requested");
                      await ensureLabel("needs:you", "d93f0b", "Human attention required");

                      const text = comment.body || "";

                      function extractJsonBlock(s) {
                        let m = s.match(/```json\s*([\s\S]*?)\s*```/i);
                        if (m?.[1]) return m[1].trim();

                        m = s.match(/```\s*([\s\S]*?)\s*```/);
                        if (m?.[1]) return m[1].trim();

                        const i = s.indexOf("[");
                        const j = s.lastIndexOf("]");
                        if (i !== -1 && j !== -1 && j > i) return s.slice(i, j + 1).trim();

                        return null;
                      }

                      const jsonText = extractJsonBlock(text);

                      async function requestRetry(reason) {
                        if (has("autopilot:retried")) {
                          await github.rest.issues.createComment({
                            owner,
                            repo,
                            issue_number: issue.number,
                            body: `❌ ${reason}\n\nI already requested one retry. Marking needs:you.`,
                          });

                          await github.rest.issues.addLabels({
                            owner,
                            repo,
                            issue_number: issue.number,
                            labels: ["needs:you"],
                          });

                          try {
                            await github.rest.issues.removeLabel({
                              owner,
                              repo,
                              issue_number: issue.number,
                              name: "autopilot:waiting-json",
                            });
                          } catch {}

                          return;
                        }

                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: issue.number,
                          labels: ["autopilot:retried"],
                        });

                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: issue.number,
                          body: [
                            "@codex",
                            "Your previous reply could not be parsed as STRICT JSON.",
                            "Please re-output ONLY one single ```json``` fenced block containing a top-level JSON array matching the required schema.",
                            "No text outside the code fence.",
                          ].join("\n"),
                        });
                      }

                      if (!jsonText) {
                        await requestRetry("Could not find a JSON block in Codex reply.");
                        return;
                      }

                      let items;
                      try {
                        items = JSON.parse(jsonText);
                        if (!Array.isArray(items)) {
                          throw new Error("JSON is not a top-level array");
                        }
                      } catch (e) {
                        await requestRetry(`JSON parse failed: ${String(e)}`);
                        return;
                      }

                      const MAX = 100;
                      const originalCount = items.length;
                      if (items.length > MAX) items = items.slice(0, MAX);

                      const batchBody = issue.body || "";
                      const areaMatch = batchBody.match(/###\s*Area[\s\S]*?\n([a-z-]+)/i);
                      const defaultArea = (areaMatch?.[1] || "web").trim();

                      function normalizePriority(p) {
                        const s = String(p || "p2").toLowerCase();
                        if (s.includes("p0")) return "p0";
                        if (s.includes("p1")) return "p1";
                        return "p2";
                      }

                      function normalizeArea(a) {
                        const s = String(a || "").trim().toLowerCase();
                        const allowed = new Set(["api", "web", "worker", "powens", "db", "infra", "ui-ux", "docs"]);
                        return allowed.has(s) ? s : defaultArea;
                      }

                      function safeTitle(t, fallback) {
                        const raw = String(t || "").trim();
                        const base = raw.length ? raw : fallback;
                        return base.toLowerCase().startsWith("spec:") ? base : `spec: ${base}`;
                      }

                      items.sort((a, b) => {
                        const ao = a?.origin === "extra" ? 1 : 0;
                        const bo = b?.origin === "extra" ? 1 : 0;
                        if (ao !== bo) return ao - bo;

                        const as = Number(a?.source_bullet ?? 1e9);
                        const bs = Number(b?.source_bullet ?? 1e9);
                        return as - bs;
                      });

                      // Build an index of existing spec issues for this batch to avoid duplicates on reruns.
                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: "open",
                        per_page: 100,
                      });

                      function existingKeyFromIssue(i) {
                        if (i.pull_request) return null;
                        if (!String(i.title || "").toLowerCase().startsWith("spec:")) return null;
                        const body = i.body || "";
                        if (!body.includes(`Parent batch: #${issue.number}`)) return null;

                        const meta = body.match(/Origin:\s*(.+?)\s*\|\s*Source bullet:\s*(.+)/i);
                        const origin = meta?.[1]?.trim() || "unknown";
                        const sourceBullet = meta?.[2]?.trim() || "n/a";

                        return `${String(i.title || "").toLowerCase()}::${origin}::${sourceBullet}`;
                      }

                      const existingMap = new Map();
                      for (const i of openIssues) {
                        const key = existingKeyFromIssue(i);
                        if (key) existingMap.set(key, i);
                      }

                      const created = [];
                      const skipped = [];

                      for (const it of items) {
                        const area = normalizeArea(it.area);
                        const prio = normalizePriority(it.priority);
                        const title = safeTitle(
                          it.title,
                          it.goal ? it.goal.slice(0, 60) : `batch item ${created.length + 1}`
                        );

                        const origin = String(it.origin || "unknown");
                        const sourceBullet = String(it.source_bullet ?? "n/a");
                        const dedupeKey = `${title.toLowerCase()}::${origin}::${sourceBullet}`;

                        const existing = existingMap.get(dedupeKey);
                        if (existing) {
                          try {
                            await github.rest.issues.addLabels({
                              owner,
                              repo,
                              issue_number: existing.number,
                              labels: ["ready"],
                            });
                          } catch {}

                          created.push(`#${existing.number} (existing)`);
                          continue;
                        }

                        const body = [
                          it.goal ? `### Goal\n${it.goal}\n` : "",
                          it.non_goals ? `### Non-goals\n${it.non_goals}\n` : "",
                          it.acceptance_criteria?.length
                            ? `### Acceptance criteria\n${it.acceptance_criteria.map((x) => `- ${x}`).join("\n")}\n`
                            : "",
                          it.breakpoints?.length
                            ? `### Breakpoints (BP1/BP2/BP3)\n${it.breakpoints.map((x) => `- ${x}`).join("\n")}\n`
                            : "",
                          it.dual_path ? `### Demo/Admin dual-path\n${it.dual_path}\n` : "",
                          it.observability ? `### Observability\n${it.observability}\n` : "",
                          it.uiux ? `### UI/UX notes\n${it.uiux}\n` : "",
                          it.risks ? `### Risks\n${it.risks}\n` : "",
                          `### ENV CHANGE REQUEST\n${it.env_change_request || "None"}\n`,
                          `---`,
                          `Parent batch: #${issue.number}`,
                          `Origin: ${origin} | Source bullet: ${sourceBullet}`,
                        ]
                          .filter(Boolean)
                          .join("\n");

                        const specLabels = [
                          "agent:pm",
                          "breakpoint",
                          "autopilot",
                          `prio:${prio}`,
                          `area:${area}`,
                        ];

                        try {
                          const res = await github.rest.issues.create({
                            owner,
                            repo,
                            title,
                            body,
                            labels: specLabels,
                          });

                          await github.rest.issues.addLabels({
                            owner,
                            repo,
                            issue_number: res.data.number,
                            labels: ["ready"],
                          });

                          created.push(`#${res.data.number}`);
                        } catch (e) {
                          skipped.push(title);
                        }
                      }

                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: issue.number,
                        labels: ["autopilot:spawned-specs"],
                      });

                      try {
                        await github.rest.issues.removeLabel({
                          owner,
                          repo,
                          issue_number: issue.number,
                          name: "autopilot:waiting-json",
                        });
                      } catch {}

                      const summary = [
                        `✅ Spawned spec issues (auto-started): ${created.join(", ") || "_none_"}`,
                        originalCount > MAX ? `⚠️ Truncated from ${originalCount} to ${MAX}.` : "",
                        skipped.length
                          ? `⚠️ Failed to create some issues: ${skipped.slice(0, 5).join(" | ")}${skipped.length > 5 ? " ..." : ""}`
                          : "",
                      ]
                        .filter(Boolean)
                        .join("\n");

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issue.number,
                        body: summary,
                      });
