name: Autopilot - Spec to Improve

on:
  issues:
    types: [labeled]

permissions:
  issues: write

concurrency:
  group: autopilot-spec-to-improve-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;

            if (payloadIssue.pull_request) return;

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const spec = live.data;
            const labels = (spec.labels || []).map((l) =>
              typeof l === "string" ? l : l.name
            );
            const has = (n) => labels.includes(n);
            const title = String(spec.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("spec:")) return;
            if (!has("agent:pm")) return;
            if (!has("autopilot")) return;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            await ensureLabel("agent:challenger", "5319e7", "Challenger role");
            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue");
            await ensureLabel("autopilot:dispatched", "bfd4f2", "Spec already dispatched to improve");

            const carry = labels.filter(
              (name) => name.startsWith("area:") || name.startsWith("prio:")
            );
            const improveTitle = spec.title.replace(/^spec:\s*/i, "improve: ");
            const improveMarker = `Parent spec: #${spec.number}`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            let improveIssue = openIssues.find((item) => {
              if (item.pull_request) return false;
              if (String(item.title || "") !== improveTitle) return false;
              return String(item.body || "").includes(improveMarker);
            });

            if (!improveIssue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: improveTitle,
                body: [
                  improveMarker,
                  "",
                  "This improve issue was created automatically from a ready spec.",
                  "Codex (challenger) should propose options and a recommendation.",
                  "Do NOT extract this issue manually in Codex.",
                  "Wait for the later `implement:` draft PR. Autopilot will request the implementation on that PR thread.",
                ].join("\n"),
                labels: ["agent:challenger", "autopilot", ...carry],
              });
              improveIssue = created.data;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: spec.number,
                body: `Improve issue created: #${improveIssue.number}`,
              });
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: spec.number,
                labels: ["autopilot:dispatched"],
              });
            } catch {}

            const pingMarker = "AUTOPILOT_CHALLENGER_REQUEST_V1";
            const improveComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: improveIssue.number,
              per_page: 100,
            });

            const alreadyPinged = improveComments.some((c) =>
              String(c.body || "").includes(pingMarker)
            );
            if (alreadyPinged) return;

            const body = [
              pingMarker,
              "@codex",
              "Role: Challenger.",
              "Do NOT open a PR from this improve issue.",
              "Do NOT treat this issue as the implementation entrypoint.",
              "Autopilot will request the implementation later on the `implement:` draft PR thread.",
              "",
              "Provide max 3 options and one recommendation for this parent spec.",
              "Cover demo/admin dual-path, observability, UI/UX states, risks, and rollback/kill-switch.",
              "",
              "Finish with:",
              "Status: READY",
              "What changed: (max 3 bullets)",
              "Risk: (low/med/high + why)",
              "Next: (one next step)",
              "",
              `Parent spec: #${spec.number} ${spec.title}`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: improveIssue.number,
              body,
            });
