name: Autopilot - CI failure to Codex

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: autopilot-ci-failure-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  notify:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect autopilot PR state
        id: inspect
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const headBranch = String(run?.head_branch || "");
            const runHeadSha = String(run?.head_sha || "");

            core.setOutput("eligible", "false");

            if (!headBranch.startsWith("agent/")) return;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });
            const pr = prs.data[0];
            if (!pr) return;

            if (runHeadSha && pr.head.sha !== runHeadSha) {
              core.info(`Skipping stale failed CI result for PR #${pr.number}: workflow head ${runHeadSha} != current head ${pr.head.sha}.`);
              return;
            }

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number,
            });
            const labels = (issue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );

            if (!labels.includes("autopilot")) return;
            if (labels.includes("autopilot:manual-takeover")) return;

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: run.id,
              per_page: 100,
            });

            const failedJobs = jobs
              .filter((job) => job.conclusion === "failure")
              .map((job) => {
                const failedSteps = (job.steps || [])
                  .filter((step) => step.conclusion === "failure")
                  .map((step) => step.name)
                  .filter(Boolean);

                if (failedSteps.length === 0) return `- ${job.name}`;
                return `- ${job.name}: ${failedSteps.join(", ")}`;
              });

            core.setOutput("eligible", "true");
            core.setOutput("prNumber", String(pr.number));
            core.setOutput("runId", String(run.id));
            core.setOutput("runUrl", String(run.html_url || ""));
            core.setOutput("headRef", String(pr.head.ref || ""));
            core.setOutput("headSha", String(pr.head.sha || ""));
            core.setOutput("failedJobs", failedJobs.join("\n"));

      - name: Collect failed log excerpt
        id: logs
        if: steps.inspect.outputs.eligible == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ steps.inspect.outputs.runId }}
        run: |
          set +e

          gh run view "$RUN_ID" --repo "$GH_REPO" --log-failed > failed.log 2>&1

          python - <<'PY'
          import os
          import pathlib
          import re

          text = pathlib.Path("failed.log").read_text(encoding="utf-8", errors="ignore")
          text = re.sub(r"\x1b\[[0-9;]*[A-Za-z]", "", text)
          lines = [line.rstrip() for line in text.splitlines()]

          patterns = [
              r"error TS\d+:",
              r"Error:",
              r"ERR_",
              r"failed",
              r"exit status",
              r"exit code",
              r"not assignable",
          ]

          excerpt = []
          carry = 0
          for line in lines:
              if any(re.search(pattern, line, re.IGNORECASE) for pattern in patterns):
                  carry = 3
              if carry > 0:
                  if line.strip():
                      excerpt.append(line)
                  carry -= 1

          if not excerpt:
              excerpt = [line for line in lines if line.strip()][-80:]

          snippet = "\n".join(excerpt[-80:]).strip()
          if len(snippet) > 12000:
              snippet = snippet[-12000:]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write("excerpt<<EOF\n")
              output.write(snippet)
              output.write("\nEOF\n")
          PY

      - name: Comment CI failure for Codex
        if: steps.inspect.outputs.eligible == 'true'
        uses: actions/github-script@v7
        env:
          FAILED_JOBS: ${{ steps.inspect.outputs.failedJobs }}
          LOG_EXCERPT: ${{ steps.logs.outputs.excerpt }}
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.inspect.outputs.prNumber }}");
            const runId = String("${{ steps.inspect.outputs.runId }}");
            const runUrl = String("${{ steps.inspect.outputs.runUrl }}");
            const headSha = String("${{ steps.inspect.outputs.headSha }}");
            const failedJobs = String(process.env.FAILED_JOBS || "").trim();
            const logExcerpt = String(process.env.LOG_EXCERPT || "").trim();

            if (!Number.isInteger(prNumber) || prNumber <= 0) return;

            async function addLabels(issueNumber, labels) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0 || labels.length === 0) return;
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels,
                });
              } catch {}
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const marker = `AUTOPILOT_CI_FAILURE_V1:${headSha || runId}`;
            if (comments.some((comment) => String(comment.body || "").includes(marker))) return;

            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A Codex patch comment was applied to this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");

            await addLabels(prNumber, ["autopilot:waiting-patch"]);
            await removeLabel(prNumber, "autopilot:ready-to-merge");
            await removeLabel(prNumber, "autopilot:patch-applied");
            await removeLabel(prNumber, "autopilot:waiting-codex");

            const body = [
              marker,
              "@codex",
              "",
              "CI failed on this PR branch.",
              "Reply on THIS PR thread with the next AUTOPILOT_PATCH_V1 fix patch. Do NOT open a new PR. Do NOT use make_pr.",
              "Reuse this PR context instead of starting from the issue again.",
              "CI is the source of truth for this PR; do not treat partial local checks as success if CI disagrees.",
              "Repo TypeScript note: exactOptionalPropertyTypes is enabled. If an optional field is absent, omit the key entirely instead of passing undefined.",
              "Before replying with the fix patch, rerun `pnpm check:ci` from the repo root if the environment setup is healthy enough to install dependencies.",
              runUrl ? `Workflow run: ${runUrl}` : "",
              failedJobs ? "" : "",
              failedJobs ? "Failed jobs/steps:" : "",
              failedJobs || "",
              logExcerpt ? "" : "",
              logExcerpt ? "Failure excerpt:" : "",
              logExcerpt ? "```text" : "",
              logExcerpt || "",
              logExcerpt ? "```" : "",
              "",
              "When CI turns green on the updated PR branch, autopilot will continue automatically.",
            ].filter(Boolean);

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: body.join("\n"),
            });
