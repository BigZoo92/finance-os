name: Autopilot - Promote queued specs

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  issues: write
  pull-requests: read

concurrency:
  group: autopilot-queue-pump
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function addLabels(issueNumber, labels) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0 || labels.length === 0) return;
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels,
                });
              } catch {}
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            async function createCommentOnce(issueNumber, marker, bodyLines) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return false;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              if (comments.some((comment) => String(comment.body || "").includes(marker))) return false;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyLines.join("\n"),
              });
              return true;
            }

            async function reopenIssue(issueNumber) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return null;
              const live = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });
              if (live.data.pull_request) return live.data;

              if (String(live.data.state || "") === "closed") {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: "open",
                });
              }

              return live.data;
            }

            async function backfillImplementationRequest(pull) {
              if (!Number.isInteger(pull?.number) || pull.number <= 0) return;

              const prIssue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: pull.number,
              });
              const labels = (prIssue.data.labels || []).map((label) =>
                typeof label === "string" ? label : label.name
              );
              const labelSet = new Set(labels);

              if (!labelSet.has("autopilot")) return;
              if (labelSet.has("autopilot:ready-to-merge")) return;
              if (!labelSet.has("autopilot:waiting-codex") && !labelSet.has("autopilot:waiting-patch")) return;

              const improveMatch = String(pull.body || "").match(/Parent improve issue:\s*#(\d+)/i);
              const improveNumber = Number(improveMatch?.[1] || "0");
              const marker = `AUTOPILOT_IMPLEMENTATION_REQUEST_V3:${Number.isInteger(improveNumber) && improveNumber > 0 ? improveNumber : pull.number}`;
              const stubPath =
                Number.isInteger(improveNumber) && improveNumber > 0
                  ? `.github/agent-stubs/improve-${improveNumber}.md`
                  : ".github/agent-stubs/<improve-number>.md";

              await addLabels(pull.number, ["autopilot:waiting-patch"]);
              await removeLabel(pull.number, "autopilot:waiting-codex");

              await createCommentOnce(
                pull.number,
                marker,
                [
                  marker,
                  "@codex",
                  "",
                  "PATCH MODE IS THE DEFAULT IMPLEMENTATION PATH FOR THIS PR.",
                  "",
                  "Reply on THIS PR thread with EXACTLY ONE comment in the required patch format.",
                  "Stay on THIS PR branch. Do NOT open another PR in Codex UI. Do NOT use make_pr.",
                  "",
                  "Required reply format:",
                  "Line 1 must be exactly:",
                  "AUTOPILOT_PATCH_V1",
                  "",
                  "Then include EXACTLY ONE fenced code block containing a unified diff.",
                  "Prefer a ```diff fence. A plain triple-backtick fence is also accepted if the first meaningful line inside is diff --git ...",
                  "",
                  "After the closing fence, append this plain-text footer outside the fence:",
                  "Status: READY",
                  "What changed: (max 3 bullets)",
                  "Risk: (low/med/high + why)",
                  "Next: (one next step)",
                  "",
                  "Mandatory rules:",
                  `- Delete ${stubPath} in the first real implementation patch.`,
                  "- Modify at least one non-stub file in the same patch.",
                  "- Use exactly ONE fenced code block and ZERO other code fences.",
                  "- Keep AUTOPILOT_PATCH_V1 and the footer outside the code fence.",
                  "- Generate the fenced diff from actual git changes on this PR branch. Do not hand-write hunk headers or line counts.",
                  "- Before replying, validate the exact patch body with `git apply --check` on the current PR branch.",
                  "- Do NOT ask a human to extract, copy, or apply anything manually.",
                ]
              );
            }

            if (context.eventName === "pull_request") {
              const pull = context.payload.pull_request;
              if (!String(pull.head?.ref || "").startsWith("agent/")) return;

              const improveMatch = String(pull.body || "").match(/Parent improve issue:\s*#(\d+)/i);
              const improveNumber = Number(improveMatch?.[1] || "0");

              if (!pull.merged && Number.isInteger(improveNumber) && improveNumber > 0) {
                const reopenedImprove = await reopenIssue(improveNumber);
                if (reopenedImprove) {
                  const specMatch = String(reopenedImprove.body || "").match(/Parent spec:\s*#(\d+)/i);
                  const specNumber = Number(specMatch?.[1] || "0");
                  const marker = `AUTOPILOT_PR_CLOSED_UNMERGED_REOPENED_V1:${pull.number}`;

                  await removeLabel(improveNumber, "pr:created");
                  await removeLabel(improveNumber, "ready");
                  await addLabels(improveNumber, ["autopilot:queued-pr"]);
                  await createCommentOnce(
                    improveNumber,
                    marker,
                    [
                      marker,
                      `Implementation PR #${pull.number} was closed without merge.`,
                      "Autopilot reopened this improve issue and requeued it for a future implementation PR slot.",
                    ]
                  );

                  if (Number.isInteger(specNumber) && specNumber > 0) {
                    await reopenIssue(specNumber);
                    await createCommentOnce(
                      specNumber,
                      marker,
                      [
                        marker,
                        `Implementation PR #${pull.number} was closed without merge.`,
                        "Autopilot reopened this spec issue because the linked implementation PR did not merge.",
                      ]
                    );
                  }
                }
              }
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            await ensureLabel("ready", "0e8a16", "Ready for next stage");
            await ensureLabel("autopilot:queued", "fbca04", "Queued until autopilot has capacity");
            await ensureLabel("autopilot:queued-pr", "fbca04", "Improve issue is waiting for the next implementation PR slot");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A Codex patch comment was applied to this PR branch");

            const openPrs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const activeAgentPrs = openPrs.filter((pull) =>
              String(pull.head?.ref || "").startsWith("agent/")
            );

            if (activeAgentPrs.length >= 1) {
              for (const pull of activeAgentPrs) {
                await backfillImplementationRequest(pull);
              }
              core.info(`Queue pump idle: ${activeAgentPrs.length} agent PR(s) are already open.`);
              return;
            }

            const queuedImproveIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "autopilot:queued-pr",
              sort: "created",
              direction: "asc",
              per_page: 100,
            });

            const nextImprove = queuedImproveIssues.find((issue) => {
              if (issue.pull_request) return false;

              const title = String(issue.title || "").toLowerCase();
              if (!title.startsWith("improve:")) return false;

              const labels = (issue.labels || []).map((label) =>
                typeof label === "string" ? label : label.name
              );

              return (
                labels.includes("autopilot") &&
                labels.includes("agent:challenger") &&
                !labels.includes("ready")
              );
            });

            if (nextImprove) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: nextImprove.number,
                  name: "autopilot:queued-pr",
                });
              } catch {}

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: nextImprove.number,
                labels: ["ready"],
              });
              return;
            }

            const queuedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "autopilot:queued",
              sort: "created",
              direction: "asc",
              per_page: 100,
            });

            const nextSpec = queuedIssues.find((issue) => {
              if (issue.pull_request) return false;

              const title = String(issue.title || "").toLowerCase();
              if (!title.startsWith("spec:")) return false;

              const labels = (issue.labels || []).map((label) =>
                typeof label === "string" ? label : label.name
              );

              return (
                labels.includes("autopilot") &&
                labels.includes("agent:pm") &&
                !labels.includes("ready")
              );
            });

            if (!nextSpec) {
              core.info("Queue pump idle: no queued spec issues found.");
              return;
            }

            try {
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: nextSpec.number,
                name: "autopilot:queued",
              });
            } catch {}

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: nextSpec.number,
              labels: ["ready"],
            });
