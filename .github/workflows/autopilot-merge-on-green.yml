name: Autopilot - Merge on green CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: autopilot-merge-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = String(context.payload.workflow_run?.head_branch || "");

            if (!headBranch.startsWith("agent/")) return;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });
            const pr = prs.data[0];
            if (!pr) return;

            if (pr.draft) return;

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number,
            });
            const labels = (issue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );

            if (!labels.includes("autopilot:patch-applied")) {
              core.info(`Skipping PR #${pr.number} because autopilot:patch-applied is missing.`);
              return;
            }

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: "squash",
            });
