name: Autopilot - Merge on green CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autopilot-merge-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect autopilot PR state
        id: inspect
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = String(context.payload.workflow_run?.head_branch || "");
            const runHeadSha = String(context.payload.workflow_run?.head_sha || "");

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            async function addLabels(issueNumber, labels) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0 || labels.length === 0) return;
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels,
                });
              } catch {}
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            async function createCommentOnce(issueNumber, marker, bodyLines, comments = null) {
              const issueComments = comments || await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              if (issueComments.some((comment) => String(comment.body || "").includes(marker))) return false;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyLines.join("\n"),
              });
              return true;
            }

            core.setOutput("eligible", "false");

            if (!headBranch.startsWith("agent/")) return;

            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A Codex patch comment was applied to this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");
            await ensureLabel("autopilot:manual-takeover", "d4c5f9", "Automatic Codex review blocked patch mode; continue on this branch manually");

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });
            const pr = prs.data[0];
            if (!pr) return;

            if (runHeadSha && pr.head.sha !== runHeadSha) {
              core.info(`Skipping stale CI result for PR #${pr.number}: workflow head ${runHeadSha} != current head ${pr.head.sha}.`);
              return;
            }

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number,
            });
            const labels = (issue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const labelSet = new Set(labels);

            if (!labelSet.has("autopilot")) return;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const filenames = files.map((file) => String(file.filename || ""));
            const hasStub = filenames.some((filename) => filename.startsWith(".github/agent-stubs/"));
            const hasNonStub = filenames.some((filename) => !filename.startsWith(".github/agent-stubs/"));

            if (!hasNonStub) {
              await createCommentOnce(
                pr.number,
                "AUTOPILOT_STUB_ONLY_WAITING_FOR_MANUAL_CODEX_V1",
                [
                  "AUTOPILOT_STUB_ONLY_WAITING_FOR_MANUAL_CODEX_V1",
                  "Autopilot will not merge this PR because it is still stub-only.",
                  "",
                  "The implementation request for this PR should already exist earlier in the thread.",
                  "Reply on this PR thread with an AUTOPILOT_PATCH_V1 comment that deletes the .github/agent-stubs/** bootstrap file and implements the requested feature in real non-stub files.",
                  "Do not open a new PR from this reminder.",
                ],
                comments
              );
              return;
            }

            if (hasStub) {
              await createCommentOnce(
                pr.number,
                "AUTOPILOT_REMOVE_STUB_REQUIRED_V2",
                [
                  "AUTOPILOT_REMOVE_STUB_REQUIRED_V2",
                  "Autopilot found real implementation changes on this PR, but the bootstrap stub file is still present in the PR diff.",
                  "",
                  "Reuse the existing implementation request for this PR.",
                  "Reply on this PR thread with a cleanup AUTOPILOT_PATCH_V1 comment that removes every .github/agent-stubs/** file from this PR diff while keeping the real implementation changes.",
                  "Do not open a new PR from this reminder.",
                ],
                comments
              );
              return;
            }

            let isDraft = Boolean(pr.draft);

            if (
              isDraft ||
              labelSet.has("autopilot:waiting-patch") ||
              labelSet.has("autopilot:patch-applied") ||
              labelSet.has("autopilot:waiting-codex")
            ) {
              if (isDraft && pr.node_id) {
                try {
                  await github.graphql(
                    `
                      mutation MarkPullRequestReadyForReview($pullRequestId: ID!) {
                        markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                          pullRequest { id isDraft }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id }
                  );
                  isDraft = false;
                } catch (error) {
                  core.warning(`Could not mark PR #${pr.number} ready for review: ${error.message}`);
                }
              }

              await addLabels(pr.number, ["autopilot:ready-to-merge"]);
              for (const name of ["autopilot:waiting-codex", "autopilot:waiting-patch", "autopilot:patch-applied", "pr:draft", "needs:you", "autopilot:manual-takeover"]) {
                await removeLabel(pr.number, name);
              }

              await createCommentOnce(
                pr.number,
                "AUTOPILOT_MANUAL_CODEX_IMPLEMENTATION_DETECTED_V1",
                [
                  "AUTOPILOT_MANUAL_CODEX_IMPLEMENTATION_DETECTED_V1",
                  "Autopilot detected a real non-stub implementation on this PR branch and promoted the PR out of draft.",
                ],
                comments
              );
            }

            if (isDraft) return;

            core.setOutput("eligible", "true");
            core.setOutput("prNumber", String(pr.number));
            core.setOutput("headRef", String(pr.head.ref || ""));
            core.setOutput("headSha", String(pr.head.sha || ""));
            core.setOutput("baseRef", String(pr.base.ref || ""));
            core.setOutput("runHeadSha", runHeadSha);

      - name: Checkout PR head branch
        if: steps.inspect.outputs.eligible == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.inspect.outputs.headRef }}
          fetch-depth: 0
          token: ${{ secrets.GH_AUTOPILOT_TOKEN }}

      - name: Rebase branch onto latest base
        id: rebase
        if: steps.inspect.outputs.eligible == 'true'
        shell: bash
        run: |
          set +e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BASE_REF="${{ steps.inspect.outputs.baseRef }}"
          HEAD_REF="${{ steps.inspect.outputs.headRef }}"
          BEFORE_SHA="$(git rev-parse HEAD)"

          git fetch origin "$BASE_REF" --depth=200

          if git merge-base --is-ancestor "origin/$BASE_REF" HEAD; then
            echo "rebased=false" >> "$GITHUB_OUTPUT"
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git rebase "origin/$BASE_REF"
          status=$?
          if [ "$status" -ne 0 ]; then
            git rebase --abort || true
            echo "rebased=false" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AFTER_SHA="$(git rev-parse HEAD)"
          if [ "$AFTER_SHA" != "$BEFORE_SHA" ]; then
            git push --force-with-lease origin HEAD:"$HEAD_REF"
            echo "rebased=true" >> "$GITHUB_OUTPUT"
          else
            echo "rebased=false" >> "$GITHUB_OUTPUT"
          fi

          echo "conflict=false" >> "$GITHUB_OUTPUT"

      - name: Flag manual action on rebase conflict
        if: steps.inspect.outputs.eligible == 'true' && steps.rebase.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.inspect.outputs.prNumber }}");

            if (!Number.isInteger(prNumber) || prNumber <= 0) return;

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ["needs:you"],
              });
            } catch {}

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const marker = "AUTOPILOT_REBASE_CONFLICT_V1";
            if (comments.some((comment) => String(comment.body || "").includes(marker))) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                marker,
                "Autopilot could not automatically rebase this PR onto the latest base branch.",
                "Resolve the branch manually, rerun CI, and autopilot will attempt the merge again.",
              ].join("\n"),
            });

      - name: Stop after successful rebase push
        if: steps.inspect.outputs.eligible == 'true' && steps.rebase.outputs.rebased == 'true'
        run: exit 0

      - name: Merge PR
        if: steps.inspect.outputs.eligible == 'true' && steps.rebase.outputs.conflict != 'true' && steps.rebase.outputs.rebased != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.inspect.outputs.prNumber }}");
            const expectedHeadSha = String("${{ steps.inspect.outputs.runHeadSha }}");

            if (!Number.isInteger(prNumber) || prNumber <= 0) return;

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (pr.data.draft) return;
            if (expectedHeadSha && pr.data.head.sha !== expectedHeadSha) {
              core.info(`Skipping merge for PR #${prNumber} because the head SHA changed after CI completed.`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: "squash",
              });
            } catch (error) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const marker = "AUTOPILOT_AUTO_MERGE_BLOCKED_V1";
              if (!comments.some((comment) => String(comment.body || "").includes(marker))) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: [
                    marker,
                    `Autopilot could not merge this PR automatically: ${String(error.message || error)}`,
                    "Check whether the base branch changed, branch protection blocked the merge, or CI status is stale.",
                  ].join("\n"),
                });
              }

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ["needs:you"],
                });
              } catch {}
            }
