name: Autopilot - Merge on green CI

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autopilot-merge-${{ github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headBranch = String(context.payload.workflow_run?.head_branch || "");

            if (!headBranch.startsWith("agent/")) return;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            async function removeLabel(issueNumber, name) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });
            const pr = prs.data[0];
            if (!pr) return;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const filenames = files.map((file) => String(file.filename || ""));
            const hasStub = filenames.some((filename) => filename.startsWith(".github/agent-stubs/"));
            const hasNonStub = filenames.some((filename) => !filename.startsWith(".github/agent-stubs/"));

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pr.number,
            });
            const labels = (issue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const labelSet = new Set(labels);

            if (!labelSet.has("autopilot")) return;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            if (!hasNonStub) {
              const marker = "AUTOPILOT_STUB_ONLY_WAITING_FOR_DIRECT_UPDATE_V2";
              const alreadyCommented = comments.some((comment) =>
                String(comment.body || "").includes(marker)
              );

              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: [
                    marker,
                    "Autopilot will not merge this PR because it is still stub-only.",
                    "",
                    "@codex address that feedback by updating THIS PR directly on its branch.",
                    "Delete the .github/agent-stubs/** bootstrap file from the PR diff and implement the requested feature in real non-stub files.",
                    "Do not open a new PR. Do not leave review-only feedback.",
                    "If direct branch update is unavailable, you may fall back to one AUTOPILOT_PATCH_V1 comment on this PR thread.",
                  ].join("\n"),
                });
              }

              core.info(`Skipping PR #${pr.number} because only .github/agent-stubs/** files changed.`);
              return;
            }

            if (hasStub) {
              const marker = "AUTOPILOT_REMOVE_STUB_REQUIRED_V1";
              const alreadyCommented = comments.some((comment) =>
                String(comment.body || "").includes(marker)
              );

              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: [
                    marker,
                    "Autopilot found real implementation changes on this PR, but the bootstrap stub file is still present in the PR diff.",
                    "",
                    "@codex remove every .github/agent-stubs/** file from this PR diff and keep the real implementation changes.",
                    "Do not leave the PR with any stub file remaining.",
                  ].join("\n"),
                });
              }

              core.info(`Skipping PR #${pr.number} because stub files still remain in the diff.`);
              return;
            }

            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation update or fallback patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A real Codex implementation landed on this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");

            let isDraft = Boolean(pr.draft);

            if (isDraft && labelSet.has("autopilot:waiting-patch")) {
              if (pr.node_id) {
                try {
                  await github.graphql(
                    `
                      mutation MarkPullRequestReadyForReview($pullRequestId: ID!) {
                        markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                          pullRequest { id isDraft }
                        }
                      }
                    `,
                    { pullRequestId: pr.node_id }
                  );
                  isDraft = false;
                } catch (error) {
                  core.warning(`Could not mark PR #${pr.number} ready for review: ${error.message}`);
                }
              }

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pr.number,
                  labels: ["autopilot:patch-applied", "autopilot:ready-to-merge"],
                });
                labelSet.add("autopilot:patch-applied");
                labelSet.add("autopilot:ready-to-merge");
              } catch {}

              for (const name of ["autopilot:waiting-patch", "autopilot:awaiting-patch", "pr:draft", "needs:you"]) {
                await removeLabel(pr.number, name);
                labelSet.delete(name);
              }

              const marker = "AUTOPILOT_DIRECT_IMPLEMENTATION_DETECTED_V1";
              const alreadyCommented = comments.some((comment) =>
                String(comment.body || "").includes(marker)
              );
              if (!alreadyCommented) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: [
                    marker,
                    "Autopilot detected a real non-stub implementation on this PR branch and promoted the PR out of draft.",
                  ].join("\n"),
                });
              }
            }

            if (isDraft) return;

            const ok = labelSet.has("autopilot:patch-applied") && labelSet.has("autopilot:ready-to-merge");
            if (!ok) return;

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: "squash",
            });
