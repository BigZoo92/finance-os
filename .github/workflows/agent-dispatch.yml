name: Agent dispatch (Codex)

on:
    issues:
        types: [opened, labeled]

permissions:
    issues: write

jobs:
    dispatch:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const issue = context.payload.issue;
                      const action = context.payload.action;
                      const addedLabel = context.payload.label?.name ?? null;

                      // Skip PRs (issues event can include PR-ish payloads)
                      if (issue.pull_request) return;

                      const labels = (issue.labels || []).map(l => l.name);
                      const has = (name) => labels.includes(name);

                      // Global guards
                      if (has("blocked") || has("wontfix") || has("won't fix") || has("agent:dispatched")) return;

                      const isPM = has("agent:pm");
                      const isChallenger = has("agent:challenger");
                      const isDev = has("agent:dev");

                      if (!isPM && !isChallenger && !isDev) return;

                      // Dispatch rules:
                      // - PM + Challenger: dispatch on OPENED
                      // - Dev: dispatch only when label READY is added (gate)
                      const shouldDispatch =
                        (isPM || isChallenger) ? (action === "opened")
                        : (isDev ? (action === "labeled" && addedLabel === "ready") : false);

                      if (!shouldDispatch) return;

                      const repo = context.repo.repo;
                      const owner = context.repo.owner;
                      const number = issue.number;
                      const url = issue.html_url;

                      const common = [
                        "Read the repo root AGENTS.md and strictly follow it.",
                        "Respect role boundaries.",
                        "When you need new API keys or env vars: fill ENV CHANGE REQUEST with exact steps + where to set in Dokploy.",
                        "Keep scope small, no unrelated refactor.",
                      ].join("\n- ");

                      const pmPrompt = `@codex\nYou are the PM/Orchestrator.\n\nTask:\n- Produce BP1 (Approach) for this spec.\n- Output: plan (steps), contracts impacted, demo/admin dual-path details, risks + kill-switch/rollback, test plan, observability signals.\n- Do NOT implement.\n\nMandatory format at the end:\nStatus: WAITING_YOU\nWhat changed: (max 3 bullets)\nRisk: (low/med/high + why)\nNeeds you: (one decision)\nNext: (one next step)\n\n- ${common}\n\nContext: ${url}`;

                      const challengerPrompt = `@codex\nYou are the Challenger (product + UX + tech).\n\nTask:\n- Propose up to 3 options + a clear recommendation.\n- Be creative but pragmatic; prefer free solutions; if paid, justify.\n- Cover demo/admin dual-path impact, observability, UX states, risks + kill-switch.\n- Do NOT implement.\n\nMandatory format at the end:\nStatus: WAITING_YOU\nWhat changed: (max 3 bullets)\nRisk: (low/med/high + why)\nNeeds you: (one decision)\nNext: (one next step)\n\n- ${common}\n\nContext: ${url}`;

                      const devPrompt = `@codex\nYou are the Dev/Implementer.\n\nTask:\n- Implement exactly what this issue requires.\n- Preserve non-breakable API contracts.\n- Demo/admin dual-path is mandatory (demo branch must short-circuit before DB/providers).\n- Add/adjust tests for behavior changes.\n- Update docs + env examples if contracts/env change.\n- Open a PR referencing this issue.\n\nWhen PR is ready, include: CI green, tests run, screenshots if UI, rollback/kill-switch notes.\n\n- ${common}\n\nContext: ${url}`;

                      let body = null;
                      if (isPM) body = pmPrompt;
                      if (isChallenger) body = challengerPrompt;
                      if (isDev) body = devPrompt;

                      await github.rest.issues.createComment({
                        owner, repo, issue_number: number, body
                      });

                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: number, labels: ["agent:dispatched"]
                      });
