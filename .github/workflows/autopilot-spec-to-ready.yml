name: Autopilot - Improve Codex reply -> ready

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

concurrency:
  group: autopilot-${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comment = context.payload.comment;
            const issue = context.payload.issue;

            if (issue.pull_request) return;

            const labels = (issue.labels || []).map(l => l.name);
            const has = (n) => labels.includes(n);
            const title = String(issue.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;

            const login = (comment.user?.login || "").toLowerCase();
            if (!login.includes("codex")) return;

            if (has("ready")) return;

            await github.rest.issues.addLabels({
              owner, repo, issue_number: issue.number, labels: ["ready"]
            });
