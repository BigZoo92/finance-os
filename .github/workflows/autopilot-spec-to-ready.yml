name: Autopilot - Improve Codex reply -> ready

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comment = context.payload.comment;
            const issue = context.payload.issue;

            if (issue.pull_request) return;

            const labels = (issue.labels || []).map(l => l.name);
            const has = (n) => labels.includes(n);
            const title = String(issue.title || "").toLowerCase();

            // Safety rail: keep batch/spec pipelines strictly separated to avoid batch issues entering improve pipelines.
            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;

            // Detect Codex author (best-effort)
            const login = (comment.user?.login || "").toLowerCase();
            if (!login.includes("codex")) return;

            // Only proceed once
            if (has("ready")) return;

            // Add ready label to trigger PR creation workflow
            await github.rest.issues.addLabels({
              owner, repo, issue_number: issue.number, labels: ["ready"]
            });
