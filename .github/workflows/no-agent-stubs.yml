name: Block agent stub files

on:
  pull_request:
    types: [synchronize, reopened, ready_for_review]

jobs:
  no_stubs:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if agent stubs exist in PR diff
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^\.github/agent-stubs/'; then
            echo "Agent stub file(s) remain in the PR diff. Delete them before merge."
            exit 1
          fi
