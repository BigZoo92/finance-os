name: Autopilot - Apply Codex diff to PR branch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autopilot-apply-diff-pr-${{ github.event.issue.pull_request && github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  apply_patch:
    if: >
      github.event.issue.pull_request != null &&
      (
        contains(github.event.comment.user.login, 'codex') ||
        github.event.comment.user.login == 'chatgpt-codex-connector' ||
        github.event.comment.user.login == 'chatgpt-codex-connector[bot]'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Guard and prepare patch metadata
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            function normalizeText(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n");
            }

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const body = normalizeText(comment?.body || "");
            const commentId = Number(comment?.id);
            const issueNumber = Number(issue?.number);

            const looksLikePatchAttempt =
              body.includes("AUTOPILOT_PATCH_V1") ||
              body.includes("diff --git ") ||
              body.includes("```");

            core.setOutput("run", "false");

            if (!issue?.pull_request) return;
            if (!Number.isInteger(commentId) || commentId <= 0) return;
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
            if (!looksLikePatchAttempt) return;

            core.setOutput("commentId", String(commentId));
            core.setOutput("prNumber", String(issueNumber));
            core.setOutput("run", "true");

      - name: Skip non-eligible comments
        if: steps.guard.outputs.run != 'true'
        run: exit 0

      - name: Skip already-processed comments
        id: seen
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setOutput("skip", "true");
              return;
            }
            if (!Number.isInteger(commentId) || commentId <= 0) {
              core.setOutput("skip", "true");
              return;
            }

            const markers = [
              `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`,
              `AUTOPILOT_PATCH_RETRY_SCHEDULED_FROM_COMMENT:${commentId}`,
              `AUTOPILOT_PATCH_HUMAN_ATTENTION_FROM_COMMENT:${commentId}`,
              `AUTOPILOT_DIRECT_UPDATE_NUDGE_FROM_COMMENT:${commentId}`,
            ];

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const already = comments.some((comment) => {
              const text = String(comment.body || "");
              return markers.some((marker) => text.includes(marker));
            });

            core.setOutput("skip", already ? "true" : "false");

      - name: Skip already-processed comment
        if: steps.seen.outputs.skip == 'true'
        run: exit 0

      - name: Fetch PR context
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = Number("${{ steps.guard.outputs.prNumber }}");

            function setFailure(reason) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "pr-lookup");
              core.setOutput("reason", reason);
            }

            if (!Number.isInteger(pullNumber) || pullNumber <= 0) {
              setFailure("Invalid PR number.");
              return;
            }

            let issueBody = "";
            try {
              const prIssue = await github.rest.issues.get({
                owner,
                repo,
                issue_number: pullNumber,
              });
              issueBody = String(prIssue.data.body || "");
            } catch (error) {
              setFailure(`PR issue lookup failed: ${String(error.message || error)}`);
              return;
            }

            const improveIssueMatch = issueBody.match(/^Parent improve issue:\s*#(\d+)$/m);
            const retryAttemptMatch = issueBody.match(/^Autopilot retry attempt:\s*(\d+)$/m);

            if (improveIssueMatch) {
              core.setOutput("improveIssueNumber", improveIssueMatch[1]);
            }
            if (retryAttemptMatch) {
              core.setOutput("retryAttempt", retryAttemptMatch[1]);
            } else {
              core.setOutput("retryAttempt", "0");
            }

            try {
              const pr = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });

              if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
                setFailure("PR head is a fork; autopilot will not push to it.");
                return;
              }

              core.setOutput("valid", "true");
              core.setOutput("failureType", "none");
              core.setOutput("reason", "");
              core.setOutput("headRef", pr.data.head.ref);
              core.setOutput("nodeId", pr.data.node_id);
              core.setOutput("isDraft", pr.data.draft ? "true" : "false");
            } catch (error) {
              const details = error?.status ? `HTTP ${error.status}` : String(error.message || error);
              setFailure(`PR lookup failed: ${details}`);
            }

      - name: Checkout PR head branch
        if: steps.pr.outputs.valid == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.headRef }}
          fetch-depth: 0
          token: ${{ secrets.GH_AUTOPILOT_TOKEN }}

      - name: Extract and validate patch
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const fs = require("fs");
            const path = require("path");

            function normalizeText(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n");
            }

            function getFirstNonEmptyLine(text) {
              for (const line of text.split("\n")) {
                const trimmed = line.trim();
                if (trimmed.length > 0) return trimmed;
              }
              return "";
            }

            function getPlaceholderReason(text) {
              if (/<unified diff>/i.test(text)) {
                return "The patch still contains the <unified diff> placeholder.";
              }
              if (/^\s*\.\.\.\s*$/m.test(text)) {
                return "The patch still contains a placeholder line with ...";
              }
              return "";
            }

            function getFooterReason(text) {
              const footerMatch = text.match(/^(Status|What changed|Risk|Next):/m);
              if (!footerMatch) return "";
              return `Move the status footer outside the patch block. Found ${footerMatch[1]}: inside the patch content.`;
            }

            function getCodeFences(text) {
              return [...text.matchAll(/```([a-zA-Z0-9_-]*)[^\n]*\n([\s\S]*?)```/g)].map((match) => ({
                language: String(match[1] || "").trim().toLowerCase(),
                content: normalizeText(match[2] || ""),
              }));
            }

            function extractPatchFromRawBody(text) {
              const lines = normalizeText(text).split("\n");
              const markerIndex = lines.findIndex((line) => line.trim() === "AUTOPILOT_PATCH_V1");
              if (markerIndex === -1) {
                return { error: "The first non-empty line must be exactly AUTOPILOT_PATCH_V1." };
              }

              const remainingLines = lines.slice(markerIndex + 1);
              const footerIndex = remainingLines.findIndex((line) => /^(Status|What changed|Risk|Next):/.test(line.trim()));
              const candidate = (footerIndex === -1 ? remainingLines : remainingLines.slice(0, footerIndex))
                .join("\n")
                .trim();

              if (!candidate) {
                return { error: "No unified diff content was found after AUTOPILOT_PATCH_V1." };
              }

              return { patchText: candidate, extractionMode: "raw" };
            }

            if ("${{ steps.pr.outputs.valid }}" !== "true") {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "pr-lookup");
              core.setOutput("reason", String("${{ steps.pr.outputs.reason }}") || "Invalid PR metadata.");
              return;
            }

            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const body = normalizeText(context.payload.comment?.body || "");

            if (getFirstNonEmptyLine(body) !== "AUTOPILOT_PATCH_V1") {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", "The first non-empty line must be exactly AUTOPILOT_PATCH_V1.");
              return;
            }

            const fences = getCodeFences(body);
            let candidate = null;

            if (fences.length > 1) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", "Reply with exactly one fenced code block and no other code fences.");
              return;
            }

            if (fences.length === 1) {
              const fenceBody = normalizeText(fences[0].content || "").trim();
              if (!fenceBody.startsWith("diff --git ")) {
                core.setOutput("valid", "false");
                core.setOutput("failureType", "format");
                core.setOutput("reason", "The fenced patch block must start with diff --git.");
                return;
              }
              candidate = {
                patchText: fenceBody,
                extractionMode: fences[0].language ? `fence:${fences[0].language}` : "fence:plain",
              };
            } else {
              candidate = extractPatchFromRawBody(body);
            }

            if (!candidate || candidate.error) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", String(candidate?.error || "Could not extract a unified diff from the comment."));
              return;
            }

            const patchText = normalizeText(candidate.patchText || "").trim();
            const footerReason = getFooterReason(patchText);
            if (footerReason) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", footerReason);
              return;
            }

            const placeholderReason = getPlaceholderReason(patchText);
            if (placeholderReason) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", placeholderReason);
              return;
            }

            if (!patchText.startsWith("diff --git ")) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", "The extracted patch must start with diff --git.");
              return;
            }

            if (patchText.includes("AUTOPILOT_PATCH_V1")) {
              core.setOutput("valid", "false");
              core.setOutput("failureType", "format");
              core.setOutput("reason", "Remove AUTOPILOT_PATCH_V1 from inside the patch content.");
              return;
            }

            const tmpDir = process.env.RUNNER_TEMP || "/tmp";
            const safeId = Number.isInteger(commentId) && commentId > 0 ? commentId : Date.now();
            const patchPath = path.join(tmpDir, `autopilot-codex-${safeId}.patch`);

            fs.writeFileSync(patchPath, `${patchText}\n`, "utf8");

            core.info(`patch extraction mode=${candidate.extractionMode} comment=${safeId}`);
            core.setOutput("valid", "true");
            core.setOutput("failureType", "none");
            core.setOutput("reason", "");
            core.setOutput("patchPath", patchPath);
            core.setOutput("mode", candidate.extractionMode);

      - name: Apply patch
        id: apply
        if: steps.extract.outputs.valid == 'true'
        shell: bash
        run: |
          set +e

          PATCH_PATH="${{ steps.extract.outputs.patchPath }}"
          STDOUT_PATH="${RUNNER_TEMP}/autopilot-apply-${{ steps.guard.outputs.commentId }}.stdout"
          STDERR_PATH="${RUNNER_TEMP}/autopilot-apply-${{ steps.guard.outputs.commentId }}.stderr"

          echo "stdoutPath=$STDOUT_PATH" >> "$GITHUB_OUTPUT"
          echo "stderrPath=$STDERR_PATH" >> "$GITHUB_OUTPUT"

          git apply --3way --whitespace=nowarn "$PATCH_PATH" >"$STDOUT_PATH" 2>"$STDERR_PATH"
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Inspect applied change set
        id: inspect
        if: steps.extract.outputs.valid == 'true' && steps.apply.outputs.status == '0'
        shell: bash
        run: |
          CHANGED_FILES="$(git diff --name-only)"

          if [ -z "$CHANGED_FILES" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "stubOnly=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          stub_only=true
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if [[ "$path" != .github/agent-stubs/* ]]; then
              stub_only=false
            fi
          done <<EOF
          $CHANGED_FILES
          EOF

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "stubOnly=$stub_only" >> "$GITHUB_OUTPUT"

      - name: Schedule retry or request human attention
        if: steps.pr.outputs.valid != 'true' || steps.extract.outputs.valid != 'true' || steps.apply.outputs.status != '0' || steps.inspect.outputs.changed != 'true' || steps.inspect.outputs.stubOnly == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const fs = require("fs");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const improveIssueNumberRaw = String("${{ steps.pr.outputs.improveIssueNumber }}");
            const improveIssueNumber = improveIssueNumberRaw ? Number(improveIssueNumberRaw) : null;
            const currentAttemptRaw = String("${{ steps.pr.outputs.retryAttempt }}");
            const currentAttempt = currentAttemptRaw ? Number(currentAttemptRaw) : 0;

            const prValid = "${{ steps.pr.outputs.valid }}" === "true";
            const prReason = String("${{ steps.pr.outputs.reason }}");
            const extractValid = "${{ steps.extract.outputs.valid }}" === "true";
            const extractReason = String("${{ steps.extract.outputs.reason }}");
            const extractFailureType = String("${{ steps.extract.outputs.failureType }}");
            const applyStatusRaw = String("${{ steps.apply.outputs.status }}");
            const applyStatus = applyStatusRaw ? Number(applyStatusRaw) : 0;
            const changed = "${{ steps.inspect.outputs.changed }}" === "true";
            const stubOnly = "${{ steps.inspect.outputs.stubOnly }}" === "true";

            const stderrPath = String("${{ steps.apply.outputs.stderrPath }}");
            const stdoutPath = String("${{ steps.apply.outputs.stdoutPath }}");

            const MAX_RETRIES = 2;
            const MAX_DIRECT_UPDATE_NUDGES = 2;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } catch {}
              }
            }

            function truncateReason(value) {
              return String(value || "").replace(/\s+/g, " ").trim().slice(0, 280);
            }

            async function addLabels(issueNumber, labels) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels,
                });
              } catch {}
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            async function listComments(issueNumber) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return [];
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function createCommentOnce(issueNumber, marker, bodyLines, existingComments = null) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return false;
              const comments = existingComments || await listComments(issueNumber);

              if (comments.some((comment) => String(comment.body || "").includes(marker))) {
                return false;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyLines.join("\n"),
              });
              return true;
            }

            async function closePullIfPossible() {
              if (!prValid) return;
              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: prNumber,
                  state: "closed",
                });
              } catch {}
            }

            let reason = "";
            let failureKind = "apply";
            const isNoChangeFailure =
              prValid &&
              extractValid &&
              applyStatus === 0 &&
              !changed;

            if (!prValid) {
              failureKind = "pr-lookup";
              reason = prReason || "Invalid PR metadata.";
            } else if (!extractValid) {
              failureKind = extractFailureType || "format";
              reason = extractReason || "Invalid patch comment.";
            } else if (applyStatus !== 0) {
              let stderr = "";
              if (stderrPath && fs.existsSync(stderrPath)) {
                stderr = fs.readFileSync(stderrPath, "utf8").replace(/\r\n/g, "\n").trim();
              }
              let stdout = "";
              if (!stderr && stdoutPath && fs.existsSync(stdoutPath)) {
                stdout = fs.readFileSync(stdoutPath, "utf8").replace(/\r\n/g, "\n").trim();
              }
              failureKind = "apply";
              reason = stderr || stdout || `git apply exited with status ${applyStatus}.`;
            } else if (stubOnly) {
              failureKind = "stub-only";
              reason = "The patch only touched .github/agent-stubs/**. The first implementation patch must also change at least one non-stub path.";
            } else if (!changed) {
              failureKind = "apply";
              reason = "The patch parsed and applied cleanly, but it produced no file changes.";
            } else {
              reason = "Unknown patch failure.";
            }

            const normalizedReason = `${failureKind}: ${truncateReason(reason)}`;
            const nextAttempt = currentAttempt + 1;

            await ensureLabel("autopilot:retry-pr", "fbca04", "Improve issue should reopen implementation as a retry PR");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation update or fallback patch comment");

            const prComments = await listComments(prNumber);

            const shouldNudgeDirectUpdate =
              prValid &&
              (
                failureKind === "format" ||
                failureKind === "stub-only" ||
                isNoChangeFailure
              );

            if (shouldNudgeDirectUpdate) {
              const nudgeCount = prComments.filter((comment) =>
                String(comment.body || "").includes("AUTOPILOT_DIRECT_UPDATE_NUDGE:")
              ).length;

              if (nudgeCount < MAX_DIRECT_UPDATE_NUDGES) {
                const nextNudge = nudgeCount + 1;
                const marker = `AUTOPILOT_DIRECT_UPDATE_NUDGE_FROM_COMMENT:${commentId}`;
                await createCommentOnce(
                  prNumber,
                  marker,
                  [
                    `AUTOPILOT_DIRECT_UPDATE_NUDGE:${nextNudge}`,
                    "@codex",
                    "",
                    "Autopilot did not get a usable implementation patch from your last reply.",
                    `Reason: ${normalizedReason}`,
                    "Address that feedback by updating THIS PR directly on its branch.",
                    "Do not open a new PR. Do not leave review-only feedback.",
                    "Delete any remaining .github/agent-stubs/** file from this PR diff and implement the requested feature in real non-stub files.",
                    "If direct branch update is unavailable, you may fall back to one AUTOPILOT_PATCH_V1 comment on this PR thread.",
                    "",
                    marker,
                  ],
                  prComments
                );

                await addLabels(prNumber, ["autopilot:waiting-patch"]);
                await removeLabel(prNumber, "needs:you");

                if (Number.isInteger(improveIssueNumber) && improveIssueNumber > 0) {
                  await removeLabel(improveIssueNumber, "autopilot:retry-pr");
                  await removeLabel(improveIssueNumber, "needs:you");
                }
                return;
              }

              if (Number.isInteger(improveIssueNumber) && improveIssueNumber > 0) {
                await addLabels(improveIssueNumber, ["needs:you"]);
                await removeLabel(improveIssueNumber, "autopilot:retry-pr");
              }

              await addLabels(prNumber, ["needs:you"]);

              const exhaustedDirectMarker = `AUTOPILOT_DIRECT_UPDATE_EXHAUSTED_FROM_COMMENT:${commentId}`;
              await createCommentOnce(
                prNumber,
                exhaustedDirectMarker,
                [
                  "Autopilot could not turn Codex review output into a real implementation automatically.",
                  "",
                  `Reason: ${normalizedReason}`,
                  "Direct-update nudges are exhausted for this PR. Human action is required.",
                  "",
                  exhaustedDirectMarker,
                ],
                prComments
              );
              return;
            }

            if (failureKind === "apply" && applyStatus !== 0 && Number.isInteger(improveIssueNumber) && improveIssueNumber > 0 && nextAttempt <= MAX_RETRIES) {
              const retryMarker = `AUTOPILOT_RETRY_REQUEST:${nextAttempt}`;
              await createCommentOnce(
                improveIssueNumber,
                retryMarker,
                [
                  retryMarker,
                  `Failed PR: #${prNumber}`,
                  `Failed comment: ${commentId}`,
                  `Failure kind: ${failureKind}`,
                  `Normalized reason: ${normalizedReason}`,
                  `Next action: reopen implementation PR as retry attempt ${nextAttempt}.`,
                ]
              );

              await addLabels(improveIssueNumber, ["autopilot:retry-pr"]);
              await removeLabel(improveIssueNumber, "needs:you");

              const prMarker = `AUTOPILOT_PATCH_RETRY_SCHEDULED_FROM_COMMENT:${commentId}`;
              await createCommentOnce(
                prNumber,
                prMarker,
                [
                  "Autopilot is closing this PR and opening a retry PR for the same improve issue.",
                  "",
                  `Reason: ${normalizedReason}`,
                  `Next retry attempt: ${nextAttempt}`,
                  "",
                  prMarker,
                ]
              );

              await closePullIfPossible();
              return;
            }

            if (Number.isInteger(improveIssueNumber) && improveIssueNumber > 0) {
              await addLabels(improveIssueNumber, ["needs:you"]);
              await removeLabel(improveIssueNumber, "autopilot:retry-pr");

              const exhaustedMarker = `AUTOPILOT_RETRY_EXHAUSTED:${currentAttempt}`;
              await createCommentOnce(
                improveIssueNumber,
                exhaustedMarker,
                [
                  exhaustedMarker,
                  `Failed PR: #${prNumber}`,
                  `Failure kind: ${failureKind}`,
                  `Normalized reason: ${normalizedReason}`,
                  "Retry limit reached. Human action is required.",
                ]
              );
            }

            await addLabels(prNumber, ["needs:you"]);

            const humanMarker = `AUTOPILOT_PATCH_HUMAN_ATTENTION_FROM_COMMENT:${commentId}`;
            await createCommentOnce(
              prNumber,
              humanMarker,
              [
                "Autopilot could not recover this Codex patch automatically.",
                "",
                `Reason: ${normalizedReason}`,
                "Retry limit reached or the parent improve issue could not be recovered automatically.",
                "",
                humanMarker,
              ]
            );

      - name: Commit and push if changed
        id: push
        if: steps.extract.outputs.valid == 'true' && steps.apply.outputs.status == '0' && steps.inspect.outputs.changed == 'true' && steps.inspect.outputs.stubOnly != 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(autopilot): apply codex patch (#${{ steps.guard.outputs.prNumber }})"
          git push origin HEAD:${{ steps.pr.outputs.headRef }}

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Finalize PR after patch apply
        if: steps.extract.outputs.valid == 'true' && steps.apply.outputs.status == '0' && steps.inspect.outputs.changed == 'true' && steps.inspect.outputs.stubOnly != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const prNodeId = String("${{ steps.pr.outputs.nodeId }}");
            const wasDraft = "${{ steps.pr.outputs.isDraft }}" === "true";
            const improveIssueNumberRaw = String("${{ steps.pr.outputs.improveIssueNumber }}");
            const improveIssueNumber = improveIssueNumberRaw ? Number(improveIssueNumberRaw) : null;

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed("Refusing to finalize an invalid PR number.");
              return;
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({ owner, repo, name, color, description });
                } catch {}
              }
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue or pull request");
            await ensureLabel("autopilot:retry-pr", "fbca04", "Improve issue should reopen implementation as a retry PR");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation update or fallback patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A real Codex implementation landed on this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");

            if (wasDraft && prNodeId) {
              await github.graphql(
                `
                  mutation MarkPullRequestReadyForReview($pullRequestId: ID!) {
                    markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                      pullRequest { id isDraft }
                    }
                  }
                `,
                { pullRequestId: prNodeId }
              );
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ["autopilot", "autopilot:patch-applied", "autopilot:ready-to-merge"],
              });
            } catch {}

            for (const name of ["autopilot:waiting-patch", "autopilot:awaiting-patch", "pr:draft", "needs:you"]) {
              await removeLabel(prNumber, name);
            }

            if (Number.isInteger(improveIssueNumber) && improveIssueNumber > 0) {
              await removeLabel(improveIssueNumber, "autopilot:retry-pr");
              await removeLabel(improveIssueNumber, "needs:you");
            }

            const successMarker = `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            if (comments.some((comment) => String(comment.body || "").includes(successMarker))) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: ["applied patch", "", successMarker].join("\n"),
            });
