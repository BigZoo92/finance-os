name: Autopilot - Apply Codex diff to PR branch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autopilot-apply-diff-pr-${{ github.event.issue.pull_request && github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  apply_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Guard and prepare patch metadata
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            function normalizeText(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n");
            }

            function getFencedBlocks(text) {
              return [...text.matchAll(/```[a-zA-Z0-9_-]*[^\n]*\n[\s\S]*?```/g)];
            }

            function getDiffBlocks(text) {
              return [...text.matchAll(/```diff[^\n]*\n([\s\S]*?)```/gi)];
            }

            function getFirstNonEmptyLine(text) {
              for (const line of text.split("\n")) {
                const trimmed = line.trim();
                if (trimmed.length > 0) {
                  return trimmed;
                }
              }

              return "";
            }

            function getPlaceholderReason(text) {
              if (/<unified diff>/i.test(text)) {
                return "The diff fence still contains the <unified diff> placeholder.";
              }

              if (/^\s*\.\.\.\s*$/m.test(text)) {
                return "The diff fence still contains a placeholder line with ...";
              }

              return "";
            }

            function getFooterReason(text) {
              const footerMatch = text.match(/^(Status|What changed|Risk|Next):/m);
              if (!footerMatch) {
                return "";
              }

              return `Move the status footer outside the diff fence. Found ${footerMatch[1]}: inside the diff block.`;
            }

            function markSkip(reason = "") {
              core.setOutput("run", "false");
              core.setOutput("notify", "false");
              core.setOutput("reason", reason);
            }

            function markFormatIssue(reason) {
              core.setOutput("run", "false");
              core.setOutput("notify", "true");
              core.setOutput("reason", reason);
            }

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const body = normalizeText(comment?.body || "");
            const authorLogin = String(comment?.user?.login || "").toLowerCase();
            const commentId = Number(comment?.id);
            const issueNumber = Number(issue?.number);
            const prNumber = Number.isInteger(issueNumber) && issueNumber > 0 ? issueNumber : null;
            const hasMarker = body.includes("AUTOPILOT_PATCH_V1");
            const fencedBlocks = getFencedBlocks(body);
            const diffBlocks = getDiffBlocks(body);
            const firstNonEmptyLine = getFirstNonEmptyLine(body);
            const looksLikePatchAttempt =
              hasMarker ||
              diffBlocks.length > 0 ||
              body.includes("diff --git ");
            const isCodexAuthor =
              authorLogin.includes("codex") ||
              authorLogin === "chatgpt-codex-connector";

            markSkip();

            if (Number.isInteger(prNumber) && prNumber > 0) {
              core.setOutput("prNumber", String(prNumber));
            }

            if (Number.isInteger(commentId) && commentId > 0) {
              core.setOutput("commentId", String(commentId));
            }

            if (!issue?.pull_request) {
              return;
            }

            if (!Number.isInteger(commentId) || commentId <= 0) {
              markSkip("The PR comment metadata was invalid.");
              return;
            }

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              markSkip("The PR number from the issue_comment payload was invalid.");
              return;
            }

            if (!isCodexAuthor) {
              return;
            }

            if (!looksLikePatchAttempt) {
              return;
            }

            if (firstNonEmptyLine !== "AUTOPILOT_PATCH_V1") {
              markFormatIssue("The first non-empty line must be exactly AUTOPILOT_PATCH_V1.");
              return;
            }

            if (diffBlocks.length !== 1 || fencedBlocks.length !== 1) {
              markFormatIssue("Reply with exactly one fenced ```diff``` block and no other code fences.");
              return;
            }

            const diffText = normalizeText(diffBlocks[0][1] || "");
            if (!/^diff --git /m.test(diffText)) {
              markFormatIssue("The diff fence must contain at least one diff --git header.");
              return;
            }

            const placeholderReason = getPlaceholderReason(diffText);
            if (placeholderReason) {
              markFormatIssue(placeholderReason);
              return;
            }

            const footerReason = getFooterReason(diffText);
            if (footerReason) {
              markFormatIssue(footerReason);
              return;
            }

            core.setOutput("run", "true");

      - name: Comment invalid patch format
        if: steps.guard.outputs.notify == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const reason = String("${{ steps.guard.outputs.reason }}");

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              return;
            }

            if (!Number.isInteger(commentId) || commentId <= 0) {
              return;
            }

            const formatMarker = `AUTOPILOT_PATCH_FORMAT_ISSUE_FROM_COMMENT:${commentId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const alreadyCommented = comments.some((existingComment) =>
              String(existingComment.body || "").includes(formatMarker)
            );
            if (alreadyCommented) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                "Autopilot skipped this Codex patch comment because the format was invalid.",
                "",
                `Reason: ${reason}`,
                "",
                "Codex: repost with AUTOPILOT_PATCH_V1 as the first non-empty line, exactly one fenced diff block, and only the real unified diff inside that fence.",
                "",
                formatMarker,
              ].join("\n"),
            });

      - name: Skip non-eligible comments
        if: steps.guard.outputs.run != 'true'
        run: exit 0

      - name: Skip already-processed comments
        id: seen
        if: steps.guard.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setOutput("skip", "true");
              return;
            }

            if (!Number.isInteger(commentId) || commentId <= 0) {
              core.setOutput("skip", "true");
              return;
            }

            const successMarker = `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`;
            const failureMarker = `AUTOPILOT_PATCH_FAILED_FROM_COMMENT:${commentId}`;
            const formatMarker = `AUTOPILOT_PATCH_FORMAT_ISSUE_FROM_COMMENT:${commentId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const alreadyProcessed = comments.some((existingComment) => {
              const text = String(existingComment.body || "");
              return (
                text.includes(successMarker) ||
                text.includes(failureMarker) ||
                text.includes(formatMarker)
              );
            });

            core.setOutput("skip", alreadyProcessed ? "true" : "false");

      - name: Skip already-processed comment
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip == 'true'
        run: exit 0

      - name: Fetch PR info
        id: pr
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = Number("${{ steps.guard.outputs.prNumber }}");

            if (!Number.isInteger(pullNumber) || pullNumber <= 0) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "The PR number from the issue_comment payload was invalid.");
              return;
            }

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "PR head is a fork; autopilot will not push to it.");
              return;
            }

            core.setOutput("valid", "true");
            core.setOutput("headRef", pr.data.head.ref);
            core.setOutput("nodeId", pr.data.node_id);
            core.setOutput("isDraft", pr.data.draft ? "true" : "false");

      - name: Checkout PR head branch
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && steps.pr.outputs.valid == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.headRef }}
          fetch-depth: 0
          token: ${{ secrets.GH_AUTOPILOT_TOKEN }}

      - name: Extract and validate diff block
        id: extract
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && steps.pr.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const fs = require("fs");
            function normalizeText(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n");
            }

            function getPlaceholderReason(text) {
              if (/<unified diff>/i.test(text)) {
                return "The diff fence still contains the <unified diff> placeholder.";
              }

              if (/^\s*\.\.\.\s*$/m.test(text)) {
                return "The diff fence still contains a placeholder line with ...";
              }

              return "";
            }

            function getFooterReason(text) {
              const footerMatch = text.match(/^(Status|What changed|Risk|Next):/m);
              if (!footerMatch) {
                return "";
              }

              return `Move the status footer outside the diff fence. Found ${footerMatch[1]}: inside the diff block.`;
            }

            const body = normalizeText(context.payload.comment?.body || "");
            const diffBlocks = [...body.matchAll(/```diff[^\n]*\n([\s\S]*?)```/gi)];

            if (diffBlocks.length !== 1) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "Expected exactly one ```diff``` block.");
              core.setOutput("failureType", "format");
              return;
            }

            const rawDiffText = normalizeText(diffBlocks[0][1] || "");

            if (rawDiffText.includes("AUTOPILOT_PATCH_V1")) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "The patch marker must stay outside the diff fence.");
              core.setOutput("failureType", "format");
              return;
            }

            const footerReason = getFooterReason(rawDiffText);
            if (footerReason) {
              core.setOutput("valid", "false");
              core.setOutput("reason", footerReason);
              core.setOutput("failureType", "format");
              return;
            }

            const placeholderReason = getPlaceholderReason(rawDiffText);
            if (placeholderReason) {
              core.setOutput("valid", "false");
              core.setOutput("reason", placeholderReason);
              core.setOutput("failureType", "format");
              return;
            }

            const diffHeaderMatch = rawDiffText.match(/^diff --git /m);
            if (!diffHeaderMatch) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "The extracted patch does not contain a unified diff header.");
              core.setOutput("failureType", "format");
              return;
            }

            let patchText = rawDiffText.slice(diffHeaderMatch.index).trim();
            if (!patchText.startsWith("diff --git ")) {
              core.setOutput("valid", "false");
              core.setOutput("reason", "The diff block must start with diff --git.");
              core.setOutput("failureType", "format");
              return;
            }

            patchText = patchText.replace(/\n*$/, "\n");
            fs.writeFileSync("codex.patch", patchText, "utf8");
            core.setOutput("valid", "true");
            core.setOutput("failureType", "none");

      - name: Apply patch
        id: apply
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && steps.pr.outputs.valid == 'true' && steps.extract.outputs.valid == 'true'
        shell: bash
        run: |
          set +e
          git apply --3way --whitespace=nowarn codex.patch >apply.stdout 2>apply.stderr
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit and push if changed
        id: push
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && steps.pr.outputs.valid == 'true' && steps.extract.outputs.valid == 'true' && steps.apply.outputs.status == '0'
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(autopilot): apply codex patch (#${{ steps.guard.outputs.prNumber }})"
          git push origin HEAD:${{ steps.pr.outputs.headRef }}
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment patch failure
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && (steps.pr.outputs.valid != 'true' || steps.extract.outputs.valid != 'true' || steps.apply.outputs.status != '0' || steps.push.outputs.changed == 'false')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const prValid = "${{ steps.pr.outputs.valid }}" === "true";
            const extractValid = "${{ steps.extract.outputs.valid }}" === "true";
            const extractFailureType = String("${{ steps.extract.outputs.failureType }}");
            const applyStatusRaw = String("${{ steps.apply.outputs.status }}");
            const applyStatus = applyStatusRaw ? Number(applyStatusRaw) : 0;
            const changed = "${{ steps.push.outputs.changed }}" === "true";

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              return;
            }

            if (!Number.isInteger(commentId) || commentId <= 0) {
              return;
            }

            function isFormatReason(value) {
              const text = String(value || "").toLowerCase();
              if (!text) {
                return false;
              }

              return [
                "first non-empty line must be exactly autopilot_patch_v1",
                "exactly one fenced ```diff``` block",
                "expected exactly one ```diff``` block",
                "patch marker must stay outside the diff fence",
                "must contain at least one diff --git header",
                "must start with diff --git",
                "unified diff header",
                "placeholder",
                "<unified diff>",
                "status footer outside the diff fence",
                "corrupt patch",
                "patch fragment without header",
                "unrecognized input",
                "no valid patches in input",
              ].some((token) => text.includes(token));
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch (innerError) {
                  core.warning(`Could not create label ${name}: ${innerError.message}`);
                }
              }
            }

            let reason = "";
            let failureKind = "needs-human";
            if (!prValid) {
              reason = String("${{ steps.pr.outputs.reason }}");
            } else if (!extractValid) {
              reason = String("${{ steps.extract.outputs.reason }}");
              failureKind =
                extractFailureType === "format" || isFormatReason(reason)
                  ? "format"
                  : "needs-human";
            } else if (applyStatus !== 0) {
              const stderr = fs.existsSync("apply.stderr")
                ? fs.readFileSync("apply.stderr", "utf8").replace(/\r\n/g, "\n").trim()
                : "";
              reason = stderr || `git apply exited with status ${applyStatus}.`;
              failureKind = isFormatReason(reason) ? "format" : "needs-human";
            } else if (!changed) {
              reason = "The diff parsed and applied cleanly, but it produced no file changes.";
            } else {
              reason = "Unknown patch failure.";
            }

            const failureMarker =
              failureKind === "format"
                ? `AUTOPILOT_PATCH_FORMAT_ISSUE_FROM_COMMENT:${commentId}`
                : `AUTOPILOT_PATCH_FAILED_FROM_COMMENT:${commentId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const alreadyCommented = comments.some((existingComment) =>
              String(existingComment.body || "").includes(failureMarker)
            );
            if (alreadyCommented) return;

            if (failureKind !== "format") {
              await ensureLabel("needs:you", "d93f0b", "Human attention required");
              await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex patch comment");

              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ["needs:you", "autopilot:waiting-patch"],
                });
              } catch (error) {
                core.warning(`Could not label PR #${prNumber}: ${error.message}`);
              }
            }

            const shortReason = reason.split("\n").slice(0, 8).join("\n");
            const title =
              failureKind === "format"
                ? "Autopilot skipped this Codex patch comment because the format was invalid."
                : "Autopilot could not apply the Codex patch for this PR comment.";
            const hint =
              failureKind === "format"
                ? "Codex: repost with AUTOPILOT_PATCH_V1 as the first non-empty line, exactly one fenced diff block, and only the real unified diff inside that fence."
                : "Hint to Codex: reply with ONE fenced diff block only, no other fences, and start the patch with diff --git.";

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                title,
                "",
                `Reason: ${shortReason}`,
                "",
                hint,
                "",
                failureMarker,
              ].join("\n"),
            });

      - name: Finalize PR after patch apply
        if: steps.guard.outputs.run == 'true' && steps.seen.outputs.skip != 'true' && steps.pr.outputs.valid == 'true' && steps.extract.outputs.valid == 'true' && steps.apply.outputs.status == '0' && steps.push.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
            const commentId = Number("${{ steps.guard.outputs.commentId }}");
            const prNodeId = String("${{ steps.pr.outputs.nodeId }}");
            const wasDraft = "${{ steps.pr.outputs.isDraft }}" === "true";

            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed("Refusing to finalize an invalid PR number.");
              return;
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch (innerError) {
                  core.warning(`Could not create label ${name}: ${innerError.message}`);
                }
              }
            }

            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue or pull request");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "Codex patch comment was applied to this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");

            if (wasDraft && prNodeId) {
              await github.graphql(
                `
                  mutation MarkPullRequestReadyForReview($pullRequestId: ID!) {
                    markPullRequestReadyForReview(input: { pullRequestId: $pullRequestId }) {
                      pullRequest {
                        id
                        isDraft
                      }
                    }
                  }
                `,
                { pullRequestId: prNodeId }
              );
            }

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ["autopilot", "autopilot:patch-applied", "autopilot:ready-to-merge"],
              });
            } catch (error) {
              core.warning(`Could not add success labels to PR #${prNumber}: ${error.message}`);
            }

            for (const name of ["autopilot:waiting-patch", "autopilot:awaiting-patch", "pr:draft"]) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name,
                });
              } catch {}
            }

            const successMarker = `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const alreadyCommented = comments.some((existingComment) =>
              String(existingComment.body || "").includes(successMarker)
            );
            if (alreadyCommented) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: [
                "\u2705 applied patch",
                "",
                successMarker,
              ].join("\n"),
            });
