name: Autopilot - Apply Codex diff to PR branch

on:
    issue_comment:
        types: [created]

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    apply_patch:
        runs-on: ubuntu-latest
        steps:
            - name: Guard - only PR comments with patch marker
              id: guard
              uses: actions/github-script@v7
              with:
                  script: |
                      const issue = context.payload.issue;
                      const comment = context.payload.comment;

                      if (!issue.pull_request) {
                        core.setOutput("run", "false");
                        return;
                      }

                      const body = comment.body || "";
                      if (!body.includes("AUTOPILOT_PATCH_V1")) {
                        core.setOutput("run", "false");
                        return;
                      }

                      core.setOutput("run", "true");
                      core.setOutput("prNumber", String(issue.number));
                      core.setOutput("commentId", String(comment.id));

            - name: Stop if not eligible
              if: steps.guard.outputs.run != 'true'
              run: exit 0

            - name: Fetch PR info
              id: pr
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const pull_number = Number("${{ steps.guard.outputs.prNumber }}");
                      const pr = await github.rest.pulls.get({ owner, repo, pull_number });

                      if (pr.data.head.repo.full_name !== `${owner}/${repo}`) {
                        core.setFailed("PR head is a fork; cannot push safely.");
                        return;
                      }

                      core.setOutput("headRef", pr.data.head.ref);

            - name: Skip if this comment was already applied
              id: seen
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
                      const commentId = "${{ steps.guard.outputs.commentId }}";
                      const marker = `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`;

                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number: prNumber,
                        per_page: 100,
                      });

                      const already = comments.some(c => (c.body || "").includes(marker));
                      core.setOutput("skip", already ? "true" : "false");

            - name: Stop if already applied
              if: steps.seen.outputs.skip == 'true'
              run: exit 0

            - name: Checkout PR head branch (with PAT)
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.pr.outputs.headRef }}
                  fetch-depth: 0
                  token: ${{ secrets.GH_AUTOPILOT_TOKEN }}

            - name: Extract diff from comment into codex.patch
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require("fs");
                      const body = context.payload.comment.body || "";
                      const m = body.match(/```diff\s*([\s\S]*?)\s*```/i);
                      if (!m) {
                        core.setFailed("No ```diff``` block found in Codex comment.");
                        return;
                      }
                      fs.writeFileSync("codex.patch", m[1], "utf8");

            - name: Apply patch (3-way)
              run: |
                  git apply --3way --whitespace=nowarn codex.patch

            - name: Commit & push
              run: |
                  if [ -z "$(git status --porcelain)" ]; then
                    echo "No changes after applying patch."
                    exit 1
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git add -A
                  git commit -m "chore(autopilot): apply codex patch (#${{ steps.guard.outputs.prNumber }})"
                  git push origin HEAD:${{ steps.pr.outputs.headRef }}

            - name: Comment success
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const prNumber = Number("${{ steps.guard.outputs.prNumber }}");
                      const commentId = "${{ steps.guard.outputs.commentId }}";
                      const marker = `AUTOPILOT_APPLIED_FROM_COMMENT:${commentId}`;

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: prNumber,
                        body: [
                          "✅ Autopilot applied Codex patch and pushed commits to this PR branch.",
                          "",
                          marker
                        ].join("\n")
                      });
