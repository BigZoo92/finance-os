name: Implement -> Draft PR (spawn)

on:
    issues:
        types: [labeled]

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    spawn_draft_pr:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const issue = context.payload.issue;
                      const addedLabel = context.payload.label?.name ?? null;

                      if (issue.pull_request) return;
                      if (addedLabel !== "ready") return;

                      const labels = (issue.labels || []).map(l => l.name);
                      const has = (name) => labels.includes(name);

                      if (!has("agent:dev")) return;
                      if (has("pr:draft")) return;
                      if (has("blocked")) return;

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const issueNumber = issue.number;

                      const repoInfo = await github.rest.repos.get({ owner, repo });
                      const baseBranch = repoInfo.data.default_branch;

                      const baseRef = await github.rest.git.getRef({
                        owner, repo, ref: `heads/${baseBranch}`
                      });
                      const baseSha = baseRef.data.object.sha;

                      const rawTitle = (issue.title || "implement").toLowerCase()
                        .replace(/^implement:\s*/i, "")
                        .replace(/[^a-z0-9]+/g, "-")
                        .replace(/^-+|-+$/g, "")
                        .slice(0, 40);

                      const branchName = `agent/impl-${issueNumber}-${rawTitle || "task"}`;

                      // 1) Create branch if missing
                      let branchExists = true;
                      try {
                        await github.rest.git.getRef({ owner, repo, ref: `heads/${branchName}` });
                      } catch (e) {
                        branchExists = false;
                      }

                      if (!branchExists) {
                        await github.rest.git.createRef({
                          owner, repo,
                          ref: `refs/heads/${branchName}`,
                          sha: baseSha
                        });
                      }

                      // 2) Ensure at least one commit exists on the branch (PR requirement)
                      // Create/update a tiny stub file unique to this issue.
                      const stubPath = `.github/agent-stubs/issue-${issueNumber}.md`;
                      const now = new Date().toISOString();

                      // Get base commit tree
                      const baseCommit = await github.rest.git.getCommit({
                        owner, repo, commit_sha: baseSha
                      });

                      const baseTreeSha = baseCommit.data.tree.sha;

                      const stubContent =
                        `# Agent stub for issue #${issueNumber}\n\n` +
                        `Created automatically to allow a draft PR to exist.\n\n` +
                        `- Created at: ${now}\n` +
                        `- Branch: ${branchName}\n\n` +
                        `The implementing agent should delete this file in the first real commit.\n`;

                      // Build a new tree with stub file
                      const newTree = await github.rest.git.createTree({
                        owner, repo,
                        base_tree: baseTreeSha,
                        tree: [{
                          path: stubPath,
                          mode: "100644",
                          type: "blob",
                          content: stubContent
                        }]
                      });

                      // Create commit on branch HEAD (baseSha)
                      const commitMsg = `chore(agent): stub for issue #${issueNumber}`;
                      const newCommit = await github.rest.git.createCommit({
                        owner, repo,
                        message: commitMsg,
                        tree: newTree.data.sha,
                        parents: [baseSha]
                      });

                      // Move branch ref to new commit
                      await github.rest.git.updateRef({
                        owner, repo,
                        ref: `heads/${branchName}`,
                        sha: newCommit.data.sha,
                        force: true
                      });

                      // 3) Create draft PR (now there is at least one commit difference)
                      const prTitle = issue.title || `implement: #${issueNumber}`;
                      const prBody = [
                        `Closes #${issueNumber}`,
                        ``,
                        `Auto-created draft PR for agent work.`,
                        `Follow AGENTS.md strictly.`,
                        ``,
                        `Note: a temporary stub file was added to enable PR creation:`,
                        `- ${stubPath}`,
                        `The implementing agent MUST delete it in the first real commit.`
                      ].join("\n");

                      const pr = await github.rest.pulls.create({
                        owner, repo,
                        title: prTitle,
                        head: branchName,
                        base: baseBranch,
                        body: prBody,
                        draft: true
                      });

                      // 4) Label issue + leave copy/paste instruction
                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: issueNumber, labels: ["pr:draft"]
                      });

                      const copyPaste = [
                        `Draft PR created: #${pr.data.number}`,
                        ``,
                        `Next (1 action): open the PR and paste this comment to start Codex:`,
                        "```",
                        "@codex implement this PR following repo AGENTS.md.",
                        "Delete the stub file `.github/agent-stubs/issue-" + issueNumber + ".md` in your first real commit.",
                        "Keep scope small. Add/adjust tests. No unrelated refactor.",
                        "```",
                      ].join("\n");

                      await github.rest.issues.createComment({
                        owner, repo, issue_number: issueNumber, body: copyPaste
                      });

                      // Also comment on PR without @codex (bot mentions often don't trigger)
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: pr.data.number,
                        body: `Context: closes #${issueNumber}. Start Codex by commenting @codex (human comment required).`
                      });
