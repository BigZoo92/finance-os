name: Autopilot - Improve ready to draft PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autopilot-improve-to-draft-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;

            if (payloadIssue.pull_request) return;

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const issue = live.data;
            const labels = (issue.labels || []).map((l) =>
              typeof l === "string" ? l : l.name
            );
            const has = (n) => labels.includes(n);
            const title = String(issue.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            await ensureLabel("pr:created", "0e8a16", "Autopilot PR created for improve issue");
            await ensureLabel("ready", "0e8a16", "Ready for next stage");
            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue or pull request");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "Codex patch comment was applied to this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;

            const rawSlug = String(issue.title || "")
              .replace(/^improve:\s*/i, "")
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "");
            const slug = (rawSlug || "task").slice(0, 32);

            const branch = `agent/impl-${issue.number}-${slug}`;
            const marker = `Parent improve issue: #${issue.number}`;
            const issueLink = `https://github.com/${owner}/${repo}/issues/${issue.number}`;

            let pull = null;

            // Prefer PR from exact head branch if present
            const prsForHead = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
            });
            if (prsForHead.data.length > 0) {
              pull = prsForHead.data[0];
            }

            if (!pull) {
              // Ensure branch exists
              let branchExists = true;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              } catch (e) {
                if (e.status === 404) branchExists = false;
                else throw e;
              }

              if (!branchExists) {
                const baseRef = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${defaultBranch}`,
                });

                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branch}`,
                  sha: baseRef.data.object.sha,
                });
              }

              // Create stub commit so PR can exist
              const stubPath = `.github/agent-stubs/improve-${issue.number}.md`;
              const stubBody = [
                `# Autopilot stub for improve #${issue.number}`,
                "",
                `Source improve issue: ${issueLink}`,
                "",
                "This file is a temporary bootstrap marker for branch/PR creation.",
                "Delete this file in the first real implementation patch.",
              ].join("\n");

              let stubSha = null;
              try {
                const existingStub = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: stubPath,
                  ref: branch,
                });
                if (!Array.isArray(existingStub.data)) stubSha = existingStub.data.sha;
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              if (!stubSha) {
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: stubPath,
                  branch,
                  message: `chore(autopilot): bootstrap improve #${issue.number}`,
                  content: Buffer.from(stubBody, "utf8").toString("base64"),
                });
              }

              // Try again to find PR (by head branch), else create it
              const prsForHead2 = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${branch}`,
              });
              if (prsForHead2.data.length > 0) {
                pull = prsForHead2.data[0];
              } else {
                const pr = await github.rest.pulls.create({
                  owner,
                  repo,
                  title: `implement: ${issue.title.replace(/^improve:\s*/i, "").trim() || `improve #${issue.number}`}`,
                  head: branch,
                  base: defaultBranch,
                  draft: true,
                  body: [
                    marker,
                    "",
                    `Source improve issue: ${issueLink}`,
                    "",
                    "Autopilot mode: Codex must reply on this PR thread with a single unified diff comment.",
                  ].join("\n"),
                });
                pull = pr.data;
              }
            }

            // Fetch PR issue/labels
            const pullIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pull.number,
            });
            const pullLabels = (pullIssue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const pullHas = (name) => pullLabels.includes(name);

            // Ensure PR is draft until patch applied
            if (!pullHas("autopilot:patch-applied") && !pull.draft) {
              try {
                await github.graphql(
                  `
                    mutation ConvertPullRequestToDraft($pullRequestId: ID!) {
                      convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                        pullRequest { id isDraft }
                      }
                    }
                  `,
                  { pullRequestId: pull.node_id }
                );
              } catch (error) {
                core.warning(`Could not convert PR #${pull.number} to draft: ${error.message}`);
              }

              const refreshed = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pull.number,
              });
              pull = refreshed.data;
            }

            // Mark improve -> PR created
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ["pr:created"],
            });

            // Label PR state
            try {
              const prLabels = pullHas("autopilot:patch-applied")
                ? ["autopilot"]
                : ["autopilot", "autopilot:waiting-patch", "pr:draft"];

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull.number,
                labels: prLabels,
              });
            } catch (error) {
              core.warning(`Could not label PR #${pull.number}: ${error.message}`);
            }

            // Cleanup conflicting labels
            for (const name of ["autopilot:awaiting-patch", "autopilot:ready-to-merge"]) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull.number,
                  name,
                });
              } catch {}
            }

            if (pullHas("autopilot:patch-applied")) {
              for (const name of ["autopilot:waiting-patch", "pr:draft"]) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pull.number,
                    name,
                  });
                } catch {}
              }
            }

            // Link improve issue -> PR
            const improveComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });
            const linked = improveComments.some((c) =>
              String(c.body || "").includes(`AUTOPILOT_PR_CREATED:${pull.number}`)
            );
            if (!linked) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `AUTOPILOT_PR_CREATED:${pull.number}\nImplementation PR: #${pull.number}`,
              });
            }

            // Ping Codex on PR (only once per improve issue) unless patch already applied
            const pingMarker = `AUTOPILOT_DIFF_MODE_REQUEST_V1:${issue.number}`;
            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const alreadyPinged = prComments.some((c) =>
              String(c.body || "").includes(pingMarker)
            );
            if (alreadyPinged || pullHas("autopilot:patch-applied")) return;

            const mustDeleteStub = `.github/agent-stubs/improve-${issue.number}.md`;

            const body = [
              pingMarker,
              "@codex",
              "",
              "PATCH MODE (MANDATORY).",
              "",
              "Your output MUST be a single PR comment on THIS thread.",
              "Do NOT create PRs in Codex UI. Do NOT use make_pr.",
              "",
              "⚠️ CRITICAL: Your reply must NOT start with '@codex', must NOT include this ping marker, and must NOT include any other preface line.",
              "",
              "Reply with EXACTLY ONE comment matching this structure:",
              "",
              "Line 1 (first non-empty line) MUST be exactly:",
              "AUTOPILOT_PATCH_V1",
              "",
              "Then include EXACTLY ONE fenced diff block (and NO other code fences anywhere):",
              "- The fenced block language MUST be 'diff' (```diff).",
              "- Inside the fence, the first meaningful line MUST be: diff --git ...",
              "- The diff must be REAL (no placeholders like ... or <unified diff>).",
              "",
              "After the closing diff fence, append a plain-text footer (NO fences):",
              "Status: READY",
              "What changed: (max 3 bullets)",
              "Risk: (low/med/high + why)",
              "Next: (one next step)",
              "",
              "Mandatory rules (if you break one, autopilot will reject):",
              "- Do not include '@codex' anywhere in your reply.",
              "- Do not include AUTOPILOT_DIFF_MODE_REQUEST_V1 anywhere in your reply.",
              "- Exactly ONE ```diff``` fence, and ZERO other fences.",
              "- Keep 'AUTOPILOT_PATCH_V1' OUTSIDE the diff fence.",
              "- Keep the footer OUTSIDE the diff fence.",
              `- In your first real patch, delete ${mustDeleteStub} (unless the PR is truly docs-only and does not need the stub removal).`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull.number,
              body,
            });
