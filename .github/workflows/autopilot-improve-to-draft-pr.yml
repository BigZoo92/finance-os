name: Autopilot - Spec -> Improve + ping Codex

on:
    issues:
        types: [labeled]

permissions:
    issues: write

concurrency:
    group: autopilot-spec-to-improve-${{ github.event.issue.number }}
    cancel-in-progress: false

jobs:
    run:
        if: github.event.label.name == 'ready'
        runs-on: ubuntu-latest
        steps:
            - name: Create improve issue
              id: create
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const payloadIssue = context.payload.issue;
                      if (payloadIssue.pull_request) return;

                      // Always re-fetch the live issue to avoid stale label decisions.
                      const live = await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number: payloadIssue.number,
                      });

                      const issue = live.data;
                      const labels = (issue.labels || []).map((l) =>
                        typeof l === "string" ? l : l.name
                      );
                      const has = (n) => labels.includes(n);
                      const title = String(issue.title || "").toLowerCase();

                      // Safety rail: keep batch/spec pipelines strictly separated.
                      if (has("batch:spec")) return;
                      if (!title.startsWith("spec:")) return;
                      if (!has("autopilot")) return;
                      if (!has("agent:pm")) return;
                      if (has("blocked") || has("wontfix") || has("won't fix")) return;

                      const carry = labels.filter(
                        (n) => n.startsWith("area:") || n.startsWith("prio:")
                      );

                      const improveTitle = issue.title.replace(/^spec:\s*/i, "improve: ");

                      // Strong idempotency: if an improve issue already exists for this spec, reuse it.
                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: "open",
                        per_page: 100,
                      });

                      const existingImprove = openIssues.find((i) => {
                        if (i.pull_request) return false;
                        if (i.title !== improveTitle) return false;
                        return (i.body || "").includes(`Parent spec: #${issue.number}`);
                      });

                      if (existingImprove) {
                        if (!has("autopilot:dispatched")) {
                          await github.rest.issues.addLabels({
                            owner,
                            repo,
                            issue_number: issue.number,
                            labels: ["autopilot:dispatched"],
                          });
                        }

                        core.setOutput("improveNumber", String(existingImprove.number));
                        return;
                      }

                      const improve = await github.rest.issues.create({
                        owner,
                        repo,
                        title: improveTitle,
                        body: [
                          `Parent spec: #${issue.number}`,
                          ``,
                          `Codex will propose up to 3 options + a recommendation.`,
                          `This is autopilot: when Codex replies, the pipeline continues automatically.`,
                        ].join("\n"),
                        labels: ["agent:challenger", "autopilot", ...carry],
                      });

                      await github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: issue.number,
                        labels: ["autopilot:dispatched"],
                      });

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issue.number,
                        body: `✅ Improve issue created: #${improve.data.number}`,
                      });

                      core.setOutput("improveNumber", String(improve.data.number));

            - name: Ping Codex on improve issue (as YOU via PAT)
              if: steps.create.outputs.improveNumber != ''
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const improveNumber = Number("${{ steps.create.outputs.improveNumber }}");

                      const payloadIssue = context.payload.issue;
                      const live = await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number: payloadIssue.number,
                      });

                      const spec = live.data;

                      const body = [
                        "@codex",
                        "You are the Challenger.",
                        "",
                        "Task:",
                        "- Propose max 3 options + recommendation for the parent spec.",
                        "- Cover demo/admin dual-path, observability, UI/UX states, risks + rollback/kill-switch.",
                        "- Prefer free; if paid, justify.",
                        "",
                        "End with:",
                        "Status: READY",
                        "What changed: (max 3 bullets)",
                        "Risk: (low/med/high + why)",
                        "Next: (one next step)",
                        "",
                        "Parent spec context:",
                        `- #${spec.number} ${spec.title}`,
                      ].join("\n");

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: improveNumber,
                        body,
                      });
