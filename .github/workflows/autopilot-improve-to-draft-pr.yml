name: Autopilot - Improve ready to draft PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autopilot-improve-to-draft-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'ready' || github.event.label.name == 'autopilot:retry-pr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;
            const triggerLabel = String(context.payload.label?.name || "");

            if (payloadIssue.pull_request) return;

            function normalizeText(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n");
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            function parseLatestRetryRequest(comments) {
              let latest = { attempt: 0, reason: "", failedPr: null };

              for (const comment of comments) {
                const body = normalizeText(comment.body || "");
                const attemptMatch = body.match(/^AUTOPILOT_RETRY_REQUEST:(\d+)$/m);
                if (!attemptMatch) continue;

                const attempt = Number(attemptMatch[1]);
                if (!Number.isInteger(attempt) || attempt < latest.attempt) continue;

                const reasonMatch = body.match(/^Normalized reason:\s*(.+)$/m);
                const failedPrMatch = body.match(/^Failed PR:\s*#(\d+)$/m);
                latest = {
                  attempt,
                  reason: String(reasonMatch?.[1] || "").trim(),
                  failedPr: failedPrMatch ? Number(failedPrMatch[1]) : null,
                };
              }

              return latest;
            }

            async function closePullWithSummary(pull, attempt, retryReason, improveIssueNumber) {
              const closeMarker = `AUTOPILOT_PR_RETRIED_BY_ATTEMPT:${attempt}`;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull.number,
                per_page: 100,
              });

              if (!comments.some((comment) => String(comment.body || "").includes(closeMarker))) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull.number,
                  body: [
                    closeMarker,
                    `This PR is being closed because autopilot is reopening improve #${improveIssueNumber} as retry attempt ${attempt}.`,
                    retryReason ? `Retry reason: ${retryReason}` : "",
                  ].filter(Boolean).join("\n"),
                });
              }

              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: pull.number,
                  state: "closed",
                });
              } catch {}
            }

            await ensureLabel("pr:created", "0e8a16", "Autopilot PR created for improve issue");
            await ensureLabel("ready", "0e8a16", "Ready for next stage");
            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue or pull request");
            await ensureLabel("autopilot:retry-pr", "fbca04", "Improve issue should reopen implementation as a retry PR");
            await ensureLabel("autopilot:waiting-patch", "fbca04", "PR is waiting for a Codex implementation update or fallback patch comment");
            await ensureLabel("autopilot:patch-applied", "0e8a16", "A real Codex implementation landed on this PR branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const issue = live.data;
            const labels = (issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const has = (name) => labels.includes(name);
            const title = String(issue.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;

            const improveComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const latestRetry = parseLatestRetryRequest(improveComments);
            const triggeredByRetry = triggerLabel === "autopilot:retry-pr";
            const retryAttempt =
              triggeredByRetry
                ? (latestRetry.attempt > 0 ? latestRetry.attempt : 1)
                : 0;
            const retryReason =
              triggeredByRetry
                ? (latestRetry.reason || "manual retry requested")
                : "";

            if (retryAttempt > 2) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ["needs:you"],
              });

              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: "autopilot:retry-pr",
                });
              } catch {}
              return;
            }

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;

            const rawSlug = String(issue.title || "")
              .replace(/^improve:\s*/i, "")
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "");
            const slug = (rawSlug || "task").slice(0, 28);

            const branchBase = `agent/impl-${issue.number}-${slug}`;
            const branch = retryAttempt > 0 ? `${branchBase}-r${retryAttempt}` : branchBase;
            const marker = `Parent improve issue: #${issue.number}`;
            const issueLink = `https://github.com/${owner}/${repo}/issues/${issue.number}`;

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const relatedPulls = openPulls.filter((pull) =>
              String(pull.body || "").includes(marker)
            );

            let pull = relatedPulls.find((item) => String(item.head?.ref || "") === branch) || null;
            if (!pull && !triggeredByRetry && relatedPulls.length > 0) {
              pull = relatedPulls[0];
            }

            for (const relatedPull of relatedPulls) {
              if (pull && relatedPull.number === pull.number) continue;
              await closePullWithSummary(relatedPull, retryAttempt, retryReason, issue.number);
            }

            if (!pull) {
              let branchExists = true;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              } catch (error) {
                if (error.status === 404) branchExists = false;
                else throw error;
              }

              if (!branchExists) {
                const baseRef = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${defaultBranch}`,
                });

                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branch}`,
                  sha: baseRef.data.object.sha,
                });
              }

              const stubPath = `.github/agent-stubs/improve-${issue.number}.md`;
              const stubBody = [
                `# Autopilot stub for improve #${issue.number}`,
                "",
                `Source improve issue: ${issueLink}`,
                "",
                "This file is a temporary bootstrap marker for branch/PR creation.",
                "Delete this file in the first real implementation patch.",
              ].join("\n");

              let stubSha = null;
              try {
                const existingStub = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: stubPath,
                  ref: branch,
                });
                if (!Array.isArray(existingStub.data)) stubSha = existingStub.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              if (!stubSha) {
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: stubPath,
                  branch,
                  message: `chore(autopilot): bootstrap improve #${issue.number}${retryAttempt > 0 ? ` retry ${retryAttempt}` : ""}`,
                  content: Buffer.from(stubBody, "utf8").toString("base64"),
                });
              }

              const createdPull = await github.rest.pulls.create({
                owner,
                repo,
                title: `implement: ${issue.title.replace(/^improve:\s*/i, "").trim() || `improve #${issue.number}`}${retryAttempt > 0 ? ` (retry ${retryAttempt})` : ""}`,
                head: branch,
                base: defaultBranch,
                draft: true,
                body: [
                  marker,
                  "",
                  `Source improve issue: ${issueLink}`,
                  `Autopilot retry attempt: ${retryAttempt}`,
                  retryReason ? `Retry reason: ${retryReason}` : "",
                  "",
                  "Autopilot mode: Codex should update this PR branch directly when possible; AUTOPILOT_PATCH_V1 comments are fallback only.",
                ].filter(Boolean).join("\n"),
              });
              pull = createdPull.data;
            }

            const pullIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pull.number,
            });
            const pullLabels = (pullIssue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const pullHas = (name) => pullLabels.includes(name);

            if (!pullHas("autopilot:patch-applied") && !pull.draft) {
              try {
                await github.graphql(
                  `
                    mutation ConvertPullRequestToDraft($pullRequestId: ID!) {
                      convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                        pullRequest { id isDraft }
                      }
                    }
                  `,
                  { pullRequestId: pull.node_id }
                );
              } catch (error) {
                core.warning(`Could not convert PR #${pull.number} to draft: ${error.message}`);
              }
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issue.number,
              labels: ["pr:created"],
            });

            try {
              if (triggeredByRetry) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: "autopilot:retry-pr",
                });
              }
            } catch {}

            try {
              if (triggeredByRetry) {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issue.number,
                  name: "needs:you",
                });
              }
            } catch {}

            try {
              const prLabels = pullHas("autopilot:patch-applied")
                ? ["autopilot"]
                : ["autopilot", "autopilot:waiting-patch", "pr:draft"];

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull.number,
                labels: prLabels,
              });
            } catch (error) {
              core.warning(`Could not label PR #${pull.number}: ${error.message}`);
            }

            for (const name of ["autopilot:awaiting-patch", "autopilot:ready-to-merge"]) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull.number,
                  name,
                });
              } catch {}
            }

            if (pullHas("autopilot:patch-applied")) {
              for (const name of ["autopilot:waiting-patch", "pr:draft"]) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pull.number,
                    name,
                  });
                } catch {}
              }
            }

            const linked = improveComments.some((comment) =>
              String(comment.body || "").includes(`AUTOPILOT_PR_CREATED:${pull.number}`)
            );
            if (!linked) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `AUTOPILOT_PR_CREATED:${pull.number}\nImplementation PR: #${pull.number}`,
              });
            }

            const pingMarker = `AUTOPILOT_IMPLEMENTATION_REQUEST_V2:${issue.number}`;
            const legacyPingMarker = `AUTOPILOT_DIFF_MODE_REQUEST_V1:${issue.number}`;
            const prComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull.number,
              per_page: 100,
            });
            const alreadyPinged = prComments.some((comment) =>
              String(comment.body || "").includes(pingMarker) ||
              String(comment.body || "").includes(legacyPingMarker)
            );
            if (alreadyPinged || pullHas("autopilot:patch-applied")) return;

            const mustDeleteStub = `.github/agent-stubs/improve-${issue.number}.md`;

            const body = [
              pingMarker,
              "@codex",
              "",
              "PRIMARY MODE: update THIS PR directly on its branch.",
              "",
              "Stay on THIS PR. Do NOT open another PR in Codex UI. Do NOT use make_pr.",
              `Delete ${mustDeleteStub} and implement the requested feature in real non-stub files on this branch.`,
              "If you already reviewed this PR, address that feedback by updating the branch.",
              "",
              "Fallback mode only if direct branch update is unavailable:",
              "- Post EXACTLY ONE issue comment on THIS PR thread.",
              "- The first non-empty line must be AUTOPILOT_PATCH_V1.",
              "- Include exactly one fenced unified diff block.",
              "- Append the status footer outside the fence.",
              "",
              "Fallback comment structure:",
              "",
              "Line 1 (first non-empty line) MUST be exactly:",
              "AUTOPILOT_PATCH_V1",
              "",
              "Then include EXACTLY ONE fenced code block:",
              "- Prefer a ```diff``` fence.",
              "- A plain triple-backtick fence is also acceptable if the first meaningful line inside is diff --git ...",
              "- The patch must be a real unified diff with no placeholders.",
              "",
              "After the closing fence, append a plain-text footer (no fences):",
              "Status: READY",
              "What changed: (max 3 bullets)",
              "Risk: (low/med/high + why)",
              "Next: (one next step)",
              "",
              "Mandatory rules:",
              `- Whether you update the branch directly or use the fallback patch comment, you MUST delete ${mustDeleteStub} AND modify at least one non-stub path.`,
              "- Do NOT leave the PR stub-only.",
              "- Do NOT reply with review-only feedback when implementation work is required.",
              "- For fallback comments only: keep AUTOPILOT_PATCH_V1 and the footer outside the code fence.",
              "- For fallback comments only: use exactly ONE fenced code block and ZERO other code fences.",
              retryReason ? `- Previous attempt failed for this reason: ${retryReason}` : "",
              retryReason ? "- Do NOT repeat that failure." : "",
            ].filter(Boolean).join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull.number,
              body,
            });
