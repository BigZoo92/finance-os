name: Autopilot - Improve ready to draft PR

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: autopilot-improve-to-draft-pr
  cancel-in-progress: false

jobs:
  run:
    if: github.event.label.name == 'ready'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_AUTOPILOT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const payloadIssue = context.payload.issue;

            if (payloadIssue.pull_request) return;

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch {
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description,
                  });
                } catch {}
              }
            }

            async function addLabels(issueNumber, labels) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0 || labels.length === 0) return;
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels,
                });
              } catch {}
            }

            async function removeLabel(issueNumber, name) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return;
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name,
                });
              } catch {}
            }

            async function listComments(issueNumber) {
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) return [];
              return github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
            }

            async function createCommentOnce(issueNumber, marker, bodyLines) {
              const comments = await listComments(issueNumber);
              if (comments.some((comment) => String(comment.body || "").includes(marker))) return false;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: bodyLines.join("\n"),
              });
              return true;
            }

            await ensureLabel("pr:created", "0e8a16", "Autopilot PR created for improve issue");
            await ensureLabel("ready", "0e8a16", "Ready for next stage");
            await ensureLabel("autopilot", "1d76db", "Autopilot-managed issue or pull request");
            await ensureLabel("autopilot:queued-pr", "fbca04", "Improve issue is waiting for the next implementation PR slot");
            await ensureLabel("autopilot:waiting-codex", "fbca04", "Draft PR is waiting for manual Codex extraction on its branch");
            await ensureLabel("autopilot:ready-to-merge", "0e8a16", "PR is ready for automatic merge after green CI");
            await ensureLabel("pr:draft", "bfd4f2", "Pull request is still draft");
            await ensureLabel("needs:you", "d93f0b", "Human attention required");

            const live = await github.rest.issues.get({
              owner,
              repo,
              issue_number: payloadIssue.number,
            });

            const issue = live.data;
            const labels = (issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const has = (name) => labels.includes(name);
            const title = String(issue.title || "").toLowerCase();

            if (has("batch:spec")) return;
            if (!title.startsWith("improve:")) return;
            if (!has("agent:challenger")) return;
            if (!has("autopilot")) return;
            if (!has("ready")) return;

            const repoInfo = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoInfo.data.default_branch;

            const rawSlug = String(issue.title || "")
              .replace(/^improve:\s*/i, "")
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "");
            const slug = (rawSlug || "task").slice(0, 28);

            const branch = `agent/impl-${issue.number}-${slug}`;
            const marker = `Parent improve issue: #${issue.number}`;
            const issueLink = `https://github.com/${owner}/${repo}/issues/${issue.number}`;
            const stubPath = `.github/agent-stubs/improve-${issue.number}.md`;

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const activeAgentPulls = openPulls.filter((pull) =>
              String(pull.head?.ref || "").startsWith("agent/")
            );

            let pull = openPulls.find((item) =>
              String(item.body || "").includes(marker)
            ) || null;

            if (!pull && activeAgentPulls.length >= 1) {
              const queueMarker = `AUTOPILOT_WAITING_FOR_PR_SLOT_V1:${issue.number}`;
              await addLabels(issue.number, ["autopilot:queued-pr"]);
              await removeLabel(issue.number, "ready");
              await createCommentOnce(
                issue.number,
                queueMarker,
                [
                  queueMarker,
                  "Autopilot did not open an implementation PR yet because another agent PR is already active.",
                  "This improve issue stays queued until the current implementation lane is merged or closed.",
                ]
              );
              return;
            }

            if (!pull) {
              let branchExists = true;
              try {
                await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              } catch (error) {
                if (error.status === 404) branchExists = false;
                else throw error;
              }

              if (!branchExists) {
                const baseRef = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${defaultBranch}`,
                });

                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branch}`,
                  sha: baseRef.data.object.sha,
                });
              }

              let stubSha = null;
              try {
                const existingStub = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: stubPath,
                  ref: branch,
                });
                if (!Array.isArray(existingStub.data)) stubSha = existingStub.data.sha;
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              if (!stubSha) {
                const stubBody = [
                  `# Autopilot stub for improve #${issue.number}`,
                  "",
                  `Source improve issue: ${issueLink}`,
                  "",
                  "This file is a temporary bootstrap marker for branch/PR creation.",
                  "Delete this file in the first real implementation patch.",
                ].join("\n");

                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: stubPath,
                  branch,
                  message: `chore(autopilot): bootstrap improve #${issue.number}`,
                  content: Buffer.from(stubBody, "utf8").toString("base64"),
                });
              }

              const createdPull = await github.rest.pulls.create({
                owner,
                repo,
                title: `implement: ${issue.title.replace(/^improve:\s*/i, "").trim() || `improve #${issue.number}`}`,
                head: branch,
                base: defaultBranch,
                draft: true,
                body: [
                  marker,
                  "",
                  `Source improve issue: ${issueLink}`,
                  "",
                  "Autopilot mode: manual Codex handoff.",
                  "Open this PR task in Codex and extract the implementation manually onto this branch.",
                  "Autopilot will merge automatically once the branch is real, green, and up to date.",
                ].join("\n"),
              });
              pull = createdPull.data;
            }

            const pullIssue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: pull.number,
            });
            const pullLabels = (pullIssue.data.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const pullHas = (name) => pullLabels.includes(name);

            if (!pullHas("autopilot:ready-to-merge") && !pull.draft) {
              try {
                await github.graphql(
                  `
                    mutation ConvertPullRequestToDraft($pullRequestId: ID!) {
                      convertPullRequestToDraft(input: { pullRequestId: $pullRequestId }) {
                        pullRequest { id isDraft }
                      }
                    }
                  `,
                  { pullRequestId: pull.node_id }
                );
              } catch (error) {
                core.warning(`Could not convert PR #${pull.number} to draft: ${error.message}`);
              }
            }

            await addLabels(issue.number, ["pr:created"]);
            await removeLabel(issue.number, "autopilot:queued-pr");
            await removeLabel(issue.number, "needs:you");

            const desiredPrLabels = ["autopilot"];
            if (pull.draft && !pullHas("autopilot:ready-to-merge")) {
              desiredPrLabels.push("autopilot:waiting-codex", "pr:draft");
            }
            await addLabels(pull.number, desiredPrLabels);

            for (const name of ["autopilot:waiting-patch", "autopilot:patch-applied", "autopilot:retry-pr", "needs:you"]) {
              await removeLabel(pull.number, name);
            }

            const linkedMarker = `AUTOPILOT_PR_CREATED:${pull.number}`;
            await createCommentOnce(
              issue.number,
              linkedMarker,
              [linkedMarker, `Implementation PR: #${pull.number}`]
            );

            const handoffMarker = `AUTOPILOT_MANUAL_CODEX_HANDOFF_V1:${issue.number}`;
            if (pullHas("autopilot:ready-to-merge")) return;

            await createCommentOnce(
              pull.number,
              handoffMarker,
              [
                handoffMarker,
                "@codex",
                "",
                "MANUAL CODEX HANDOFF ONLY.",
                "",
                "This PR is intentionally paused for manual extraction in Codex.",
                "No GitHub reply is required. This comment exists so the task appears in Codex.",
                "Stay on THIS PR branch. Do NOT open another PR in Codex UI. Do NOT use make_pr.",
                `Delete ${stubPath} and implement the requested feature in real non-stub files on this branch.`,
                "Before declaring the task done, prefer repo CI-equivalent checks for the touched scope. If local dependencies are missing, say so explicitly and let CI be the source of truth.",
                `Parent improve issue: #${issue.number}`,
                `Source improve issue: ${issueLink}`,
                "",
                "After you extract manually and push commits on this branch, autopilot will update the branch if needed and merge automatically once CI is green.",
              ]
            );
