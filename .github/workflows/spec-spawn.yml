name: Spec spawn (create improve + implement issues)

on:
    issues:
        types: [labeled]

permissions:
    issues: write

jobs:
    spawn:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const issue = context.payload.issue;
                      const addedLabel = context.payload.label?.name ?? null;

                      if (issue.pull_request) return;
                      if (addedLabel !== "ready") return;

                      const labels = (issue.labels || []).map(l => l.name);
                      const has = (name) => labels.includes(name);

                      // Only spawn from PM specs
                      if (!has("agent:pm")) return;
                      if (has("agent:spawned")) return;
                      if (has("blocked") || has("wontfix") || has("won't fix")) return;

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      const specNumber = issue.number;
                      const specUrl = issue.html_url;
                      const specTitle = issue.title || "spec";

                      // Helpers to parse issue form sections like:
                      // ### Area\napi\n\n### Priority\np1 ...
                      const body = issue.body || "";
                      function section(name) {
                        const re = new RegExp(`###\\s+${name}\\s*\\n([\\s\\S]*?)(?=\\n###\\s+|$)`, "i");
                        const m = body.match(re);
                        return (m?.[1] ?? "").trim();
                      }

                      const area = section("Area").split("\n")[0].trim();        // api/web/worker/...
                      const prioRaw = section("Priority").toLowerCase();
                      const prio = prioRaw.includes("p0") ? "prio:p0" : prioRaw.includes("p1") ? "prio:p1" : "prio:p2";
                      const areaLabel = area ? `area:${area}` : null;

                      const baseName = specTitle.replace(/^spec:\s*/i, "").trim() || "work-item";

                      const improveTitle = `improve: ${baseName}`;
                      const implementTitle = `implement: ${baseName}`;

                      const improveBody = [
                        `Parent spec: #${specNumber}`,
                        ``,
                        `Context: ${specUrl}`,
                        ``,
                        `Goal: Propose max 3 options + recommendation, with demo/admin impact, observability, UX notes, risks, ENV CHANGE REQUEST.`,
                      ].join("\n");

                      const implementBody = [
                        `Parent spec: #${specNumber}`,
                        ``,
                        `Context: ${specUrl}`,
                        ``,
                        `Goal (from spec):`,
                        section("Goal") || "_(see parent spec)_",
                        ``,
                        `Acceptance criteria (from spec):`,
                        section("Acceptance criteria") || "_(see parent spec)_",
                        ``,
                        `Demo/Admin dual-path (from spec):`,
                        section("Demo/Admin dual-path") || "_(see parent spec)_",
                        ``,
                        `Implementation notes:`,
                        `- Keep scope small, no unrelated refactor.`,
                        `- Preserve non-breakable API contracts.`,
                        ``,
                        `Test plan (from spec):`,
                        section("Observability") ? "_(see parent spec for observability too)_" : "_(see parent spec)_",
                        ``,
                        `ENV CHANGE REQUEST:`,
                        section("ENV CHANGE REQUEST") || "None",
                      ].join("\n");

                      function mkLabels(base) {
                        const out = [...base];
                        if (areaLabel) out.push(areaLabel);
                        out.push(prio);
                        // optional: enforce kind:feature if you want
                        if (!out.includes("kind:feature")) out.push("kind:feature");
                        return out;
                      }

                      // Create improve issue (dispatches immediately)
                      const improve = await github.rest.issues.create({
                        owner, repo,
                        title: improveTitle,
                        body: improveBody,
                        labels: mkLabels(["agent:challenger"])
                      });

                      // Create implement issue (gated: Dev starts when YOU label it ready)
                      const implement = await github.rest.issues.create({
                        owner, repo,
                        title: implementTitle,
                        body: implementBody,
                        labels: mkLabels(["agent:dev", "needs:you", "breakpoint"])
                      });

                      // Comment back on spec with links + mark spawned
                      await github.rest.issues.createComment({
                        owner, repo, issue_number: specNumber,
                        body: [
                          `Spawned child issues:`,
                          `- Challenger: #${improve.data.number}`,
                          `- Dev (gated): #${implement.data.number} (remove/keep \`needs:you\`, then add \`ready\` to start dev)`,
                        ].join("\n")
                      });

                      await github.rest.issues.addLabels({
                        owner, repo, issue_number: specNumber, labels: ["agent:spawned"]
                      });
