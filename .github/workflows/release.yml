name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional immutable image tag to deploy manually
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      build_time: ${{ steps.meta.outputs.build_time }}
      push_images: ${{ steps.meta.outputs.push_images }}
      trigger_deploy: ${{ steps.meta.outputs.trigger_deploy }}
    steps:
      - name: Compute metadata
        id: meta
        env:
          GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}
          MANUAL_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${GHCR_IMAGE_NAME}" ]]; then
            echo "Missing repository variable GHCR_IMAGE_NAME." >&2
            exit 1
          fi

          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sha_tag="sha-${GITHUB_SHA}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            push_images="true"
            trigger_deploy="true"
          else
            release_tag="${MANUAL_RELEASE_TAG:-${sha_tag}}"
            push_images="false"
            if [[ -n "${MANUAL_RELEASE_TAG}" ]]; then
              trigger_deploy="true"
            else
              trigger_deploy="false"
            fi
          fi

          echo "image_base=${GHCR_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${sha_tag}" >> "${GITHUB_OUTPUT}"
          echo "build_time=${build_time}" >> "${GITHUB_OUTPUT}"
          echo "push_images=${push_images}" >> "${GITHUB_OUTPUT}"
          echo "trigger_deploy=${trigger_deploy}" >> "${GITHUB_OUTPUT}"

  build_and_push:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - web
          - api
          - worker
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_base }}-${{ matrix.target }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
      SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}
      PUSH_IMAGES: ${{ needs.prepare.outputs.push_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=raw,value=${{ env.SHA_TAG }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.target }}
          build-args: |
            NODE_VERSION=${{ vars.NODE_VERSION || '22.15.0' }}
            BUN_VERSION=${{ vars.BUN_VERSION || '1.2.22' }}
            PNPM_VERSION=${{ vars.PNPM_VERSION || '10.15.0' }}
            API_INTERNAL_URL=${{ vars.API_INTERNAL_URL || 'http://api:3001' }}
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'finance-os' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            GIT_SHA=${{ github.sha }}
            GIT_TAG=${{ needs.prepare.outputs.release_tag }}
            BUILD_TIME=${{ needs.prepare.outputs.build_time }}

  sync_dokploy:
    name: Sync Dokploy compose and env
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_and_push
    if: needs.prepare.outputs.trigger_deploy == 'true'
    environment:
      name: production
      url: https://finance-os.enzogivernaud.fr
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Dokploy compose file and APP_IMAGE_TAG
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
        run: |
          set -euo pipefail

          : "${DOKPLOY_URL:?Missing secret DOKPLOY_URL}"
          : "${DOKPLOY_API_KEY:?Missing secret DOKPLOY_API_KEY}"
          : "${DOKPLOY_COMPOSE_ID:?Missing secret DOKPLOY_COMPOSE_ID}"

          dokploy_base_url="${DOKPLOY_URL%/}"
          dokploy_base_url="${dokploy_base_url%/api}"
          api_base="${dokploy_base_url}/api"

          compose_one_response="$(mktemp)"
          compose_one_code="$(
            curl --silent --show-error --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 60 \
              --connect-timeout 10 \
              --max-time 120 \
              -o "${compose_one_response}" \
              -w "%{http_code}" \
              -X GET "${api_base}/compose.one?composeId=${DOKPLOY_COMPOSE_ID}" \
              -H "accept: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}"
          )"

          if [[ "${compose_one_code}" -lt 200 || "${compose_one_code}" -ge 300 ]]; then
            echo "Dokploy compose.one failed (HTTP ${compose_one_code})." >&2
            cat "${compose_one_response}" >&2
            exit 1
          fi

          current_env="$(
            jq -r 'first(.. | objects | select(has("env")) | .env) // ""' "${compose_one_response}"
          )"

          upsert_env_var() {
            local content="$1"
            local key="$2"
            local value="$3"

            if printf '%s\n' "${content}" | grep -qE "^${key}="; then
              printf '%s\n' "${content}" | sed -E "s#^${key}=.*#${key}=${value}#"
              return
            fi

            if [[ -z "${content}" ]]; then
              printf '%s=%s\n' "${key}" "${value}"
              return
            fi

            printf '%s\n%s=%s\n' "${content}" "${key}" "${value}"
          }

          updated_env="${current_env}"
          updated_env="$(upsert_env_var "${updated_env}" "APP_IMAGE_TAG" "${RELEASE_TAG}")"
          updated_env="$(upsert_env_var "${updated_env}" "APP_VERSION" "${RELEASE_TAG}")"
          updated_env="$(upsert_env_var "${updated_env}" "APP_COMMIT_SHA" "${GITHUB_SHA}")"

          compose_file_payload="$(jq -Rs . < docker-compose.prod.yml)"
          compose_payload="$(jq -n \
            --arg composeId "${DOKPLOY_COMPOSE_ID}" \
            --arg env "${updated_env}" \
            --argjson composeFile "${compose_file_payload}" \
            '{
              composeId: $composeId,
              sourceType: "raw",
              composeFile: $composeFile,
              env: $env
            }'
          )"

          compose_update_response="$(mktemp)"
          compose_update_code="$(
            curl --silent --show-error --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 60 \
              --connect-timeout 10 \
              --max-time 120 \
              -o "${compose_update_response}" \
              -w "%{http_code}" \
              -X POST "${api_base}/compose.update" \
              -H "accept: application/json" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --data "${compose_payload}"
          )"

          if [[ "${compose_update_code}" -lt 200 || "${compose_update_code}" -ge 300 ]]; then
            echo "Dokploy compose.update failed (HTTP ${compose_update_code})." >&2
            cat "${compose_update_response}" >&2
            exit 1
          fi

          verify_response="$(mktemp)"
          verify_code="$(
            curl --silent --show-error --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 60 \
              --connect-timeout 10 \
              --max-time 120 \
              -o "${verify_response}" \
              -w "%{http_code}" \
              -X GET "${api_base}/compose.one?composeId=${DOKPLOY_COMPOSE_ID}" \
              -H "accept: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}"
          )"

          if [[ "${verify_code}" -lt 200 || "${verify_code}" -ge 300 ]]; then
            echo "Dokploy compose.one verification failed (HTTP ${verify_code})." >&2
            cat "${verify_response}" >&2
            exit 1
          fi

          verified_env="$(
            jq -r 'first(.. | objects | select(has("env")) | .env) // ""' "${verify_response}"
          )"

          if ! printf '%s\n' "${verified_env}" | grep -qE "^APP_IMAGE_TAG=${RELEASE_TAG}$"; then
            echo "Dokploy compose env did not persist APP_IMAGE_TAG=${RELEASE_TAG}." >&2
            cat "${verify_response}" >&2
            exit 1
          fi

          echo "Dokploy compose and env synced for ${RELEASE_TAG}."

  trigger_dokploy:
    name: Trigger Dokploy deployment API
    runs-on: ubuntu-latest
    needs:
      - prepare
      - sync_dokploy
    if: needs.prepare.outputs.trigger_deploy == 'true'
    permissions:
      contents: read
    steps:
      - name: Deploy updated compose
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          : "${DOKPLOY_URL:?Missing secret DOKPLOY_URL}"
          : "${DOKPLOY_API_KEY:?Missing secret DOKPLOY_API_KEY}"
          : "${DOKPLOY_COMPOSE_ID:?Missing secret DOKPLOY_COMPOSE_ID}"

          dokploy_base_url="${DOKPLOY_URL%/}"
          dokploy_base_url="${dokploy_base_url%/api}"
          api_base="${dokploy_base_url}/api"

          deploy_payload="$(jq -n \
            --arg composeId "${DOKPLOY_COMPOSE_ID}" \
            --arg title "release ${RELEASE_TAG}" \
            --arg description "${GITHUB_REPOSITORY}@${GITHUB_SHA}" \
            '{
              composeId: $composeId,
              title: $title,
              description: $description
            }'
          )"

          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 60 \
              --connect-timeout 10 \
              --max-time 120 \
              -o "${response_file}" \
              -w "%{http_code}" \
              -X POST "${api_base}/compose.deploy" \
              -H "accept: application/json" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --data "${deploy_payload}"
          )"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            echo "Dokploy compose.deploy failed (HTTP ${http_code})." >&2
            cat "${response_file}" >&2
            exit 1
          fi

          echo "Dokploy deployment triggered for ${RELEASE_TAG}."

  post_deploy_smoke:
    name: Post-deploy smoke
    runs-on: ubuntu-latest
    needs:
      - prepare
      - trigger_dokploy
    if: needs.prepare.outputs.trigger_deploy == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for public health endpoint
        env:
          SMOKE_BASE_URL: https://finance-os.enzogivernaud.fr
        run: |
          set -euo pipefail

          for attempt in $(seq 1 24); do
            if curl --silent --show-error --fail --location \
              --max-time 15 \
              "${SMOKE_BASE_URL}/health" > /tmp/release-smoke-health.json; then
              echo "Health endpoint is reachable."
              exit 0
            fi

            echo "Waiting for deployment to become reachable (${attempt}/24)..."
            sleep 10
          done

          echo "Timed out waiting for ${SMOKE_BASE_URL}/health after deployment." >&2
          exit 1

      - name: Run production smoke checks
        env:
          SMOKE_BASE_URL: https://finance-os.enzogivernaud.fr
          SMOKE_AUTH_MODE: ${{ vars.SMOKE_AUTH_MODE }}
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
          SMOKE_SUMMARY_RANGE: ${{ vars.SMOKE_SUMMARY_RANGE }}
        run: node scripts/smoke-prod.mjs --base="${SMOKE_BASE_URL}"
