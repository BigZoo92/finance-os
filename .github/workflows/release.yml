name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override for dry-run builds
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      push_images: ${{ steps.meta.outputs.push_images }}
      trigger_deploy: ${{ steps.meta.outputs.trigger_deploy }}
    steps:
      - name: Compute metadata
        id: meta
        env:
          GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}
          MANUAL_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${GHCR_IMAGE_NAME}" ]]; then
            echo "Missing repository variable GHCR_IMAGE_NAME." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            image_tag="${GITHUB_REF_NAME}"
            push_images="true"
            trigger_deploy="true"
          else
            image_tag="${MANUAL_IMAGE_TAG:-dry-run-${GITHUB_SHA::7}}"
            push_images="false"
            trigger_deploy="false"
          fi

          echo "image_base=${GHCR_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "push_images=${push_images}" >> "${GITHUB_OUTPUT}"
          echo "trigger_deploy=${trigger_deploy}" >> "${GITHUB_OUTPUT}"

  build_and_push:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - web
          - api
          - worker
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_base }}-${{ matrix.target }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      PUSH_IMAGES: ${{ needs.prepare.outputs.push_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ env.PUSH_IMAGES == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.target }}
          build-args: |
            NODE_VERSION=${{ vars.NODE_VERSION || '22.15.0' }}
            BUN_VERSION=${{ vars.BUN_VERSION || '1.2.22' }}
            PNPM_VERSION=${{ vars.PNPM_VERSION || '10.15.0' }}
            API_INTERNAL_URL=${{ vars.API_INTERNAL_URL || 'http://api:3001' }}
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'finance-os' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            VITE_PRIVATE_ACCESS_TOKEN=${{ secrets.VITE_PRIVATE_ACCESS_TOKEN || '' }}

  trigger_dokploy:
    name: Trigger Dokploy deployment API
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_and_push
    if: needs.prepare.outputs.trigger_deploy == 'true'
    permissions:
      contents: read
    steps:
      - name: Call Dokploy API deploy endpoint
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          RELEASE_TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${DOKPLOY_URL}" ]]; then
            echo "Missing secret DOKPLOY_URL." >&2
            exit 1
          fi

          if [[ -z "${DOKPLOY_API_KEY}" ]]; then
            echo "Missing secret DOKPLOY_API_KEY." >&2
            exit 1
          fi
          dokploy_base_url="${dokploy_base_url%/api}"

          api_base="${dokploy_base_url}/api"

          if [[ -n "${DOKPLOY_COMPOSE_ID:-}" ]]; then
            endpoint="${api_base}/compose.deploy"
            payload=$(printf '{"composeId":"%s","title":"release %s","description":"%s@%s"}' \
              "${DOKPLOY_COMPOSE_ID}" "${RELEASE_TAG}" "${GITHUB_REPOSITORY}" "${GITHUB_SHA}")
          elif [[ -n "${DOKPLOY_APPLICATION_ID:-}" ]]; then
            endpoint="${api_base}/application.deploy"
            payload=$(printf '{"applicationId":"%s"}' "${DOKPLOY_APPLICATION_ID}")
          else
            echo "Missing secret DOKPLOY_COMPOSE_ID (recommended) or DOKPLOY_APPLICATION_ID." >&2
            exit 1
          fi

          http_code="$(
            curl --silent --show-error --location \
              -o "${response_file}" -w "%{http_code}" \
              -X POST "${endpoint}" \
              -H "accept: application/json" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --data "${payload}"
          )"
                    payload=''

          if [[ -n "${DOKPLOY_COMPOSE_ID:-}" ]]; then
            deploy_path='/api/compose.deploy'
            payload=$(printf '{"composeId":"%s","title":"release %s","description":"%s@%s"}' "${DOKPLOY_COMPOSE_ID}" "${RELEASE_TAG}" "${GITHUB_REPOSITORY}" "${GITHUB_SHA}")
          elif [[ -n "${DOKPLOY_APPLICATION_ID:-}" ]]; then
            deploy_path='/api/application.deploy'
            payload=$(printf '{"applicationId":"%s"}' "${DOKPLOY_APPLICATION_ID}")
          else
            echo "Missing secret DOKPLOY_COMPOSE_ID (recommended) or DOKPLOY_APPLICATION_ID." >&2
            exit 1
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --location \
              --retry 3 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 60 \
              --connect-timeout 10 \
              --max-time 120 \
              -o "${response_file}" \
              -w "%{http_code}" \
              -X POST "${dokploy_base_url}${deploy_path}" \
              -H "accept: application/json" \
              -H "Content-Type: application/json" \
              -H "x-api-key: ${DOKPLOY_API_KEY}" \
              --data "${payload}"
          )"

          if [[ "${http_code}" -lt 200 || "${http_code}" -ge 300 ]]; then
            echo "Dokploy API deploy failed (HTTP ${http_code})." >&2
            echo "Response body:" >&2
            cat "${response_file}" >&2
            exit 1
          fi

          if grep -q 'Branch Not Match' "${response_file}"; then
            echo "Dokploy returned Branch Not Match; this indicates a webhook/branch flow mismatch." >&2
            echo "Response body:" >&2
            cat "${response_file}" >&2
            exit 1
          fi

          echo "Dokploy deployment triggered via ${deploy_path}."
