name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override for dry-run builds
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    outputs:
      image_base: ${{ steps.meta.outputs.image_base }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      push_images: ${{ steps.meta.outputs.push_images }}
      trigger_deploy: ${{ steps.meta.outputs.trigger_deploy }}
    steps:
      - name: Compute metadata
        id: meta
        env:
          GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}
          MANUAL_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${GHCR_IMAGE_NAME}" ]]; then
            echo "Missing repository variable GHCR_IMAGE_NAME." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            image_tag="${GITHUB_REF_NAME}"
            push_images="true"
            trigger_deploy="true"
          else
            image_tag="${MANUAL_IMAGE_TAG:-dry-run-${GITHUB_SHA::7}}"
            push_images="false"
            trigger_deploy="false"
          fi

          echo "image_base=${GHCR_IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "push_images=${push_images}" >> "${GITHUB_OUTPUT}"
          echo "trigger_deploy=${trigger_deploy}" >> "${GITHUB_OUTPUT}"

  build_and_push:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - web
          - api
          - worker
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_base }}-${{ matrix.target }}
      IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
      PUSH_IMAGES: ${{ needs.prepare.outputs.push_images }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.PUSH_IMAGES == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ env.PUSH_IMAGES == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ env.PUSH_IMAGES == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.target }}
          build-args: |
            NODE_VERSION=${{ vars.NODE_VERSION || '22.15.0' }}
            BUN_VERSION=${{ vars.BUN_VERSION || '1.2.22' }}
            PNPM_VERSION=${{ vars.PNPM_VERSION || '10.15.0' }}
            API_INTERNAL_URL=${{ vars.API_INTERNAL_URL || 'http://api:3001' }}
            VITE_APP_TITLE=${{ vars.VITE_APP_TITLE || 'finance-os' }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            VITE_PRIVATE_ACCESS_TOKEN=${{ secrets.VITE_PRIVATE_ACCESS_TOKEN || '' }}

  trigger_dokploy:
    name: Trigger Dokploy deployment
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_and_push
    if: needs.prepare.outputs.trigger_deploy == 'true'
    permissions:
      contents: read
    steps:
      - name: Call Dokploy webhook
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
          DOKPLOY_WEBHOOK_TOKEN: ${{ secrets.DOKPLOY_WEBHOOK_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${DOKPLOY_WEBHOOK_URL}" ]]; then
            echo "Missing secret DOKPLOY_WEBHOOK_URL." >&2
            exit 1
          fi

          curl_headers=(-H "Content-Type: application/json")
          if [[ -n "${DOKPLOY_WEBHOOK_TOKEN}" ]]; then
            curl_headers+=(-H "Authorization: Bearer ${DOKPLOY_WEBHOOK_TOKEN}" -H "X-Dokploy-Token: ${DOKPLOY_WEBHOOK_TOKEN}")
          fi

          payload=$(printf '{"tag":"%s","sha":"%s","repository":"%s"}' "${RELEASE_TAG}" "${GITHUB_SHA}" "${GITHUB_REPOSITORY}")

          curl --fail --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            --retry-max-time 45 \
            -X POST "${DOKPLOY_WEBHOOK_URL}" \
            "${curl_headers[@]}" \
            --data "${payload}"
