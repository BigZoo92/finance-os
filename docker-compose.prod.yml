      - no-new-privileges:true

  worker:
    <<: *resource-worker
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-worker:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://finance-os-api:3001}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      WORKER_HEARTBEAT_MS: ${WORKER_HEARTBEAT_MS:-30000}
      WORKER_HEALTHCHECK_FILE: /var/run/finance-os/worker-heartbeat
      WORKER_HEALTHCHECK_MAX_AGE_MS: ${WORKER_HEALTHCHECK_MAX_AGE_MS:-120000}
      WORKER_AUTO_SYNC_ENABLED: ${WORKER_AUTO_SYNC_ENABLED:-false}
      SYNC_STATUS_PERSISTENCE_ENABLED: ${SYNC_STATUS_PERSISTENCE_ENABLED:-true}
      POWENS_SYNC_INTERVAL_MS: ${POWENS_SYNC_INTERVAL_MS:-43200000}
      POWENS_SYNC_MIN_INTERVAL_PROD_MS: ${POWENS_SYNC_MIN_INTERVAL_PROD_MS:-43200000}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:-}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:-}
      POWENS_BASE_URL: ${POWENS_BASE_URL:-}
      POWENS_DOMAIN: ${POWENS_DOMAIN:-}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:-}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:-}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      # --- Scheduler & advisor feature flags --------------------------------
      # Listed explicitly so Dokploy values reach the container env. Variables
      # that are missing here are NEVER propagated by docker compose, even if
      # Dokploy sets them in the UI, which silently leaves the worker on the
      # zod schema defaults (mostly `false`) and produces logs like:
      #   "worker post-mortem scheduler disabled
      #    reason AI_POST_MORTEM_AUTO_RUN_ENABLED=false".
      # Defaults below mirror the env package fallbacks so behaviour is
      # unchanged when Dokploy is silent.
      EXTERNAL_INTEGRATIONS_SAFE_MODE: ${EXTERNAL_INTEGRATIONS_SAFE_MODE:-false}
      AI_POST_MORTEM_AUTO_RUN_ENABLED: ${AI_POST_MORTEM_AUTO_RUN_ENABLED:-false}
      AI_POST_MORTEM_ENABLED: ${AI_POST_MORTEM_ENABLED:-false}
      AI_POST_MORTEM_CRON: ${AI_POST_MORTEM_CRON:-0 7 * * *}
      AI_POST_MORTEM_TIMEZONE: ${AI_POST_MORTEM_TIMEZONE:-Europe/Paris}
      AI_DAILY_AUTO_RUN_ENABLED: ${AI_DAILY_AUTO_RUN_ENABLED:-false}
      AI_DAILY_INTERVAL_MS: ${AI_DAILY_INTERVAL_MS:-900000}
      DAILY_INTELLIGENCE_ENABLED: ${DAILY_INTELLIGENCE_ENABLED:-false}
      DAILY_INTELLIGENCE_CRON: ${DAILY_INTELLIGENCE_CRON:-0 9 * * 1-5}
      DAILY_INTELLIGENCE_NIGHT_CRON: ${DAILY_INTELLIGENCE_NIGHT_CRON:-15 23 * * *}
      DAILY_INTELLIGENCE_MORNING_CRON: ${DAILY_INTELLIGENCE_MORNING_CRON:-30 7 * * *}
      DAILY_INTELLIGENCE_TIMEZONE: ${DAILY_INTELLIGENCE_TIMEZONE:-Europe/Paris}
      DAILY_INTELLIGENCE_LOCK_TTL_SECONDS: ${DAILY_INTELLIGENCE_LOCK_TTL_SECONDS:-1800}
      DAILY_INTELLIGENCE_MAX_DURATION_SECONDS: ${DAILY_INTELLIGENCE_MAX_DURATION_SECONDS:-3600}
      DAILY_INTELLIGENCE_DRY_RUN_DEFAULT: ${DAILY_INTELLIGENCE_DRY_RUN_DEFAULT:-false}
      DAILY_INTELLIGENCE_MANUAL_TRIGGER_ENABLED: ${DAILY_INTELLIGENCE_MANUAL_TRIGGER_ENABLED:-true}
      NEWS_AUTO_INGEST_ENABLED: ${NEWS_AUTO_INGEST_ENABLED:-true}
      NEWS_FETCH_INTERVAL_MS: ${NEWS_FETCH_INTERVAL_MS:-14400000}
      MARKET_DATA_AUTO_REFRESH_ENABLED: ${MARKET_DATA_AUTO_REFRESH_ENABLED:-false}
      MARKET_DATA_REFRESH_INTERVAL_MS: ${MARKET_DATA_REFRESH_INTERVAL_MS:-21600000}
      MARKET_DATA_REFRESH_COOLDOWN_SECONDS: ${MARKET_DATA_REFRESH_COOLDOWN_SECONDS:-900}
      SIGNALS_SOCIAL_POLLING_ENABLED: ${SIGNALS_SOCIAL_POLLING_ENABLED:-false}
      SIGNALS_SOCIAL_POLLING_INTERVAL_MS: ${SIGNALS_SOCIAL_POLLING_INTERVAL_MS:-3600000}
      ATTENTION_SYSTEM_ENABLED: ${ATTENTION_SYSTEM_ENABLED:-true}
      ATTENTION_REBUILD_AUTO_ENABLED: ${ATTENTION_REBUILD_AUTO_ENABLED:-false}
      ATTENTION_REBUILD_INTERVAL_MS: ${ATTENTION_REBUILD_INTERVAL_MS:-600000}
      AI_ADVISOR_ENABLED: ${AI_ADVISOR_ENABLED:-true}
      AI_ADVISOR_FORCE_LOCAL_ONLY: ${AI_ADVISOR_FORCE_LOCAL_ONLY:-false}
      AI_KNOWLEDGE_QA_RETRIEVAL_ENABLED: ${AI_KNOWLEDGE_QA_RETRIEVAL_ENABLED:-true}
      ADVISOR_X_SIGNALS_MODE: ${ADVISOR_X_SIGNALS_MODE:-shadow}
      # External investments — worker reads providers + valuation pipeline.
      EXTERNAL_INVESTMENTS_ENABLED: ${EXTERNAL_INVESTMENTS_ENABLED:-true}
      EXTERNAL_INVESTMENTS_SAFE_MODE: ${EXTERNAL_INVESTMENTS_SAFE_MODE:-false}
      EXTERNAL_INVESTMENTS_VALUATION_TARGET_CURRENCY: ${EXTERNAL_INVESTMENTS_VALUATION_TARGET_CURRENCY:-EUR}
      EXTERNAL_INVESTMENTS_BINANCE_VALUATION_ENABLED: ${EXTERNAL_INVESTMENTS_BINANCE_VALUATION_ENABLED:-true}
      EXTERNAL_INVESTMENTS_BINANCE_VALUATION_USD_EUR_FALLBACK: ${EXTERNAL_INVESTMENTS_BINANCE_VALUATION_USD_EUR_FALLBACK:-0.92}
      IBKR_FLEX_ENABLED: ${IBKR_FLEX_ENABLED:-true}
      IBKR_FLEX_BASE_URL: ${IBKR_FLEX_BASE_URL:-https://ndcdyn.interactivebrokers.com}
      IBKR_FLEX_USER_AGENT: ${IBKR_FLEX_USER_AGENT:-Finance-OS External Investments/1.0}
      IBKR_FLEX_TIMEOUT_MS: ${IBKR_FLEX_TIMEOUT_MS:-30000}
      BINANCE_SPOT_ENABLED: ${BINANCE_SPOT_ENABLED:-true}
      BINANCE_SPOT_BASE_URL: ${BINANCE_SPOT_BASE_URL:-https://api.binance.com}
      BINANCE_SPOT_RECV_WINDOW_MS: ${BINANCE_SPOT_RECV_WINDOW_MS:-5000}
      BINANCE_SPOT_TIMEOUT_MS: ${BINANCE_SPOT_TIMEOUT_MS:-30000}
      # Visibility-only: these flags are consumed by the API, not the worker
      # zod schema. Propagating them here keeps `docker exec ... env` parity
      # with Dokploy so ops can diff intent vs container state in one place.
      ADVISOR_GRAPH_INGEST_ENABLED: ${ADVISOR_GRAPH_INGEST_ENABLED:-true}
      TRADING_LAB_GRAPH_INGEST_ENABLED: ${TRADING_LAB_GRAPH_INGEST_ENABLED:-true}
      NEWS_PROVIDER_X_TWITTER_ENABLED: ${NEWS_PROVIDER_X_TWITTER_ENABLED:-false}
      NEWS_PROVIDER_X_TWITTER_QUERY: ${NEWS_PROVIDER_X_TWITTER_QUERY:-}
      # Worker scheduler flags for X daily previous-day sync — the actual call
      # and budget enforcement live in the API.
      X_DAILY_PREVIOUS_DAY_SYNC_ENABLED: ${X_DAILY_PREVIOUS_DAY_SYNC_ENABLED:-false}
      X_DAILY_PREVIOUS_DAY_CRON: ${X_DAILY_PREVIOUS_DAY_CRON:-0 7 * * *}
      X_DAILY_PREVIOUS_DAY_TIMEZONE: ${X_DAILY_PREVIOUS_DAY_TIMEZONE:-Europe/Paris}
      X_DAILY_PREVIOUS_DAY_TRIGGER_TIMEOUT_MS: ${X_DAILY_PREVIOUS_DAY_TRIGGER_TIMEOUT_MS:-60000}
      X_DAILY_PREVIOUS_DAY_LOCK_TTL_SECONDS: ${X_DAILY_PREVIOUS_DAY_LOCK_TTL_SECONDS:-1800}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    volumes:
      - worker_run_v2:/var/run/finance-os
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "infra/docker/healthchecks/worker-heartbeat-healthcheck.mjs",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  ops-alerts:
    <<: *resource-ops-alerts
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-api:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    command: ["bun", "infra/docker/ops-alerts/monitor.mjs"]
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERTS_WEBHOOK_URL: ${ALERTS_WEBHOOK_URL:-}
      ALERTS_WEBHOOK_HEADERS_JSON: ${ALERTS_WEBHOOK_HEADERS_JSON:-}
      ALERTS_POLL_INTERVAL_MS: ${ALERTS_POLL_INTERVAL_MS:-30000}
      ALERTS_HTTP_TIMEOUT_MS: ${ALERTS_HTTP_TIMEOUT_MS:-5000}
      ALERTS_5XX_THRESHOLD: ${ALERTS_5XX_THRESHOLD:-3}
      ALERTS_5XX_WINDOW_MS: ${ALERTS_5XX_WINDOW_MS:-300000}
      ALERTS_5XX_PROBE_URLS: ${ALERTS_5XX_PROBE_URLS:-http://web:3000/api/auth/me,http://web:3000/api/dashboard/summary?range=30d}
      ALERTS_HEALTHCHECK_FAILURE_THRESHOLD: ${ALERTS_HEALTHCHECK_FAILURE_THRESHOLD:-2}
      ALERTS_HEALTHCHECK_URLS: ${ALERTS_HEALTHCHECK_URLS:-http://web:3000/healthz,http://finance-os-api:3001/health}
      ALERTS_WORKER_HEARTBEAT_FILE: /var/run/finance-os/worker-heartbeat
      ALERTS_WORKER_STALE_AFTER_MS: ${ALERTS_WORKER_STALE_AFTER_MS:-120000}
      ALERTS_DISK_FREE_PERCENT_THRESHOLD: ${ALERTS_DISK_FREE_PERCENT_THRESHOLD:-10}
      ALERTS_DISK_PATHS: ${ALERTS_DISK_PATHS:-/mnt/postgres,/mnt/redis}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance_os_internal
    volumes:
      - worker_run_v2:/var/run/finance-os:ro
      - postgres_data:/mnt/postgres:ro
      - redis_data:/mnt/redis:ro
    security_opt:
      - no-new-privileges:true

  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:-ghcr.io/nousresearch/hermes-agent:latest}
    profiles:
      - hermes-agent
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      API_SERVER_HOST: 127.0.0.1
      API_SERVER_PORT: ${HERMES_AGENT_PORT:-8080}
      API_SERVER_KEY: ${HERMES_AGENT_API_KEY:-}
      HERMES_GATEWAY_ENABLED: "false"
    command:
      [
        "sh",
        "-lc",
        'if [ -z "$API_SERVER_KEY" ]; then echo ''hermes-agent requires HERMES_AGENT_API_KEY'' >&2; exit 1; fi; exec hermes api-server --host "$API_SERVER_HOST" --port "$API_SERVER_PORT" --api-key "$API_SERVER_KEY"',
      ]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    security_opt:
      - no-new-privileges:true

  knowledge-service-storage-init:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-knowledge-service:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: "no"
    user: "0:0"
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /data/knowledge-graph && chown -R app:app /data/knowledge-graph && chmod -R u+rwX,g+rwX /data/knowledge-graph && stat -c 'knowledge graph storage owner=%u:%g mode=%a path=%n' /data/knowledge-graph",
      ]
    logging: *default-logging
    volumes:
      - knowledge_graph_data:/data/knowledge-graph
    security_opt:
      - no-new-privileges:true

  knowledge-service:
    <<: *resource-knowledge-service
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-knowledge-service:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    expose:
      - "8011"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      KNOWLEDGE_SERVICE_ENABLED: ${KNOWLEDGE_SERVICE_ENABLED:-true}
      KNOWLEDGE_GRAPH_BACKEND: ${KNOWLEDGE_GRAPH_BACKEND:-neo4j}
      KNOWLEDGE_GRAPH_STORAGE_PATH: /data/knowledge-graph
      KNOWLEDGE_GRAPH_REBUILD_ON_START: ${KNOWLEDGE_GRAPH_REBUILD_ON_START:-true}
      KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS: ${KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS:-1800}
      KNOWLEDGE_GRAPH_VECTOR_ENABLED: ${KNOWLEDGE_GRAPH_VECTOR_ENABLED:-true}
      KNOWLEDGE_GRAPH_FULLTEXT_ENABLED: ${KNOWLEDGE_GRAPH_FULLTEXT_ENABLED:-true}
      KNOWLEDGE_GRAPH_TEMPORAL_ENABLED: ${KNOWLEDGE_GRAPH_TEMPORAL_ENABLED:-true}
      KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED: ${KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED:-true}
      KNOWLEDGE_GRAPH_RETRIEVAL_MODE: ${KNOWLEDGE_GRAPH_RETRIEVAL_MODE:-hybrid}
      KNOWLEDGE_GRAPH_RERANKING_ENABLED: ${KNOWLEDGE_GRAPH_RERANKING_ENABLED:-true}
      KNOWLEDGE_GRAPH_MAX_PATH_DEPTH: ${KNOWLEDGE_GRAPH_MAX_PATH_DEPTH:-3}
      KNOWLEDGE_GRAPH_MIN_CONFIDENCE: ${KNOWLEDGE_GRAPH_MIN_CONFIDENCE:-0.35}
      KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS: ${KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS:-45}
      KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER: ${KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_GRAPH_EMBEDDING_MODEL: ${KNOWLEDGE_GRAPH_EMBEDDING_MODEL:-local-hashing-v1}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      KNOWLEDGE_USE_PRODUCTION_BACKENDS: ${KNOWLEDGE_USE_PRODUCTION_BACKENDS:-true}
      KNOWLEDGE_REQUIRE_PRODUCTION_BACKENDS_IN_ADMIN: ${KNOWLEDGE_REQUIRE_PRODUCTION_BACKENDS_IN_ADMIN:-true}
      KNOWLEDGE_ALLOW_LOCAL_FALLBACK_IN_ADMIN: ${KNOWLEDGE_ALLOW_LOCAL_FALLBACK_IN_ADMIN:-true}
      KNOWLEDGE_NEO4J_URI: ${KNOWLEDGE_NEO4J_URI:-bolt://neo4j:7687}
      KNOWLEDGE_NEO4J_USER: ${KNOWLEDGE_NEO4J_USER:-${NEO4J_USERNAME:-neo4j}}
      KNOWLEDGE_NEO4J_PASSWORD: ${KNOWLEDGE_NEO4J_PASSWORD:-${NEO4J_PASSWORD:-}}
      KNOWLEDGE_NEO4J_DATABASE: ${KNOWLEDGE_NEO4J_DATABASE:-neo4j}
      KNOWLEDGE_QDRANT_URL: ${KNOWLEDGE_QDRANT_URL:-http://qdrant:6333}
      KNOWLEDGE_QDRANT_API_KEY: ${KNOWLEDGE_QDRANT_API_KEY:-${QDRANT_API_KEY:-}}
      KNOWLEDGE_QDRANT_COLLECTION: ${KNOWLEDGE_QDRANT_COLLECTION:-finance_os_knowledge}
      KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-local-hashing-v1}
      KNOWLEDGE_EMBEDDING_DIMENSIONS: ${KNOWLEDGE_EMBEDDING_DIMENSIONS:-256}
    depends_on:
      knowledge-service-storage-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
      qdrant:
        # Qdrant ships as a distroless image (no /bin/sh, no wget/curl) so a
        # Docker-level healthcheck cannot be executed inside the container.
        # The knowledge-service handles Qdrant connectivity with retries on
        # its own (qdrant-client) and is itself fail-soft via
        # KNOWLEDGE_SERVICE_ENABLED. service_started is sufficient here.
        condition: service_started
    networks:
      - finance_os_internal
    volumes:
      - knowledge_graph_data:/data/knowledge-graph
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8011/health'', timeout=3).read()"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    security_opt:
      - no-new-privileges:true

  quant-service:
    <<: *resource-quant-service
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-quant-service:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    expose:
      - "8012"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      QUANT_SERVICE_HOST: 0.0.0.0
      QUANT_SERVICE_PORT: 8012
      TRADING_LAB_PAPER_ONLY: ${TRADING_LAB_PAPER_ONLY:-true}
      TRADING_LAB_MAX_BACKTEST_ROWS: ${TRADING_LAB_MAX_BACKTEST_ROWS:-50000}
      TRADING_LAB_DEFAULT_FEES_BPS: ${TRADING_LAB_DEFAULT_FEES_BPS:-10}
      TRADING_LAB_DEFAULT_SLIPPAGE_BPS: ${TRADING_LAB_DEFAULT_SLIPPAGE_BPS:-5}
    networks:
      - finance_os_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8012/health'', timeout=3).read()"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    security_opt:
      - no-new-privileges:true

  neo4j:
    <<: *resource-neo4j
    image: neo4j:5-community
    restart: unless-stopped
    logging: *default-logging
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-change-me}"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1024m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    expose:
      - "7474"
      - "7687"
    volumes:
      - knowledge_neo4j_data:/data
      - knowledge_neo4j_logs:/logs
    networks:
      - finance_os_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:7474 >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  qdrant:
    <<: *resource-qdrant
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "6333"
      - "6334"
    volumes:
      - knowledge_qdrant_data:/qdrant/storage
    networks:
      - finance_os_internal
    # No Docker-level healthcheck: qdrant/qdrant v1.10+ uses a distroless base
    # image with no shell and no wget/curl, so any CMD-SHELL or wget-based
    # probe always fails and falsely marks the container unhealthy. Qdrant's
    # /healthz endpoint is still reachable from other containers and from the
    # knowledge-service, which is the actual readiness signal we care about.
    security_opt:
      - no-new-privileges:true

  postgres:
    <<: *resource-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    shm_size: 256m
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=256MB",
        "-c",
        "effective_cache_size=768MB",
        "-c",
        "work_mem=4MB",
      ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_os}
      POSTGRES_USER: ${POSTGRES_USER:-finance_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  redis:
    <<: *resource-redis
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1000",
        "--loglevel",
        "warning",
        "--maxmemory",
        "192mb",
        "--maxmemory-policy",
        "noeviction",
      ]
    volumes:
      - redis_data:/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

networks:
  finance_os_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  worker_run_v2:
  knowledge_graph_data:
  knowledge_neo4j_data:
  knowledge_neo4j_logs:
  knowledge_qdrant_data:
