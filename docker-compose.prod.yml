      NEWS_PROVIDER_ECB_DATA_SERIES_KEYS: ${NEWS_PROVIDER_ECB_DATA_SERIES_KEYS:-}
      NEWS_PROVIDER_FED_ENABLED: ${NEWS_PROVIDER_FED_ENABLED:-true}
      NEWS_PROVIDER_FED_FEED_URLS: ${NEWS_PROVIDER_FED_FEED_URLS:-}
      NEWS_PROVIDER_SEC_ENABLED: ${NEWS_PROVIDER_SEC_ENABLED:-true}
      NEWS_PROVIDER_SEC_TICKERS: ${NEWS_PROVIDER_SEC_TICKERS:-}
      NEWS_PROVIDER_FRED_ENABLED: ${NEWS_PROVIDER_FRED_ENABLED:-false}
      NEWS_PROVIDER_FRED_SERIES_IDS: ${NEWS_PROVIDER_FRED_SERIES_IDS:-}
      NEWS_PROVIDER_X_TWITTER_ENABLED: ${NEWS_PROVIDER_X_TWITTER_ENABLED:-false}
