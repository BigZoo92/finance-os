      POWENS_REFRESH_BACKGROUND_ENABLED: ${POWENS_REFRESH_BACKGROUND_ENABLED:-true}
      # News providers
      LIVE_NEWS_INGESTION_ENABLED: ${LIVE_NEWS_INGESTION_ENABLED:-true}
      NEWS_AI_CONTEXT_BUNDLE_ENABLED: ${NEWS_AI_CONTEXT_BUNDLE_ENABLED:-true}
      NEWS_MAX_PROVIDER_ITEMS_PER_RUN: ${NEWS_MAX_PROVIDER_ITEMS_PER_RUN:-20}
      NEWS_METADATA_FETCH_ENABLED: ${NEWS_METADATA_FETCH_ENABLED:-true}
      NEWS_METADATA_FETCH_TIMEOUT_MS: ${NEWS_METADATA_FETCH_TIMEOUT_MS:-2500}
