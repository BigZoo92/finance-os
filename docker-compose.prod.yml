name: finance-os-prod

services:
  web:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-web:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    init: true
    # TODO:: mettre à true quand le debug sera fini CODEX NE MODIFIE PAS CETTE LIGNE
    # read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    # Public entrypoint: browser traffic hits `web`, and Nitro proxies `/api/*`
    # to the API through a unique internal DNS alias. Avoid the generic `api`
    # hostname because Dokploy can attach multiple stacks to shared networks.
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_URL: ${APP_URL:-}
      WEB_URL: ${WEB_URL:-}
      API_URL: ${API_URL:-}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      HEALTHCHECK_URL: http://127.0.0.1:3000/healthz
      API_INTERNAL_URL: http://finance-os-api:3001
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-finance-os}
      VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED: ${VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED:-true}
      VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS: ${VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS:-300}
      VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED: ${VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED:-true}
      VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED: ${VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED:-true}
      VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED: ${VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED:-true}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_DEBUG: ${APP_DEBUG:-0}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD", "node", "infra/docker/healthchecks/http-healthcheck.mjs"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  api:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-api:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    # Internal-only service. Public `/api/*` requests are expected to go
    # through `web:3000`, which proxies them to this container.
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_URL: ${APP_URL:-}
      WEB_URL: ${WEB_URL:-}
      API_URL: ${API_URL:-}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      DEBUG_METRICS_TOKEN: ${DEBUG_METRICS_TOKEN:-}
      KNOWLEDGE_SERVICE_ENABLED: ${KNOWLEDGE_SERVICE_ENABLED:-false}
      KNOWLEDGE_SERVICE_URL: ${KNOWLEDGE_SERVICE_URL:-http://knowledge-service:8011}
      KNOWLEDGE_SERVICE_TIMEOUT_MS: ${KNOWLEDGE_SERVICE_TIMEOUT_MS:-2500}
      KNOWLEDGE_GRAPH_BACKEND: ${KNOWLEDGE_GRAPH_BACKEND:-neo4j}
      KNOWLEDGE_GRAPH_STORAGE_PATH: ${KNOWLEDGE_GRAPH_STORAGE_PATH:-/data/knowledge-graph}
      KNOWLEDGE_GRAPH_REBUILD_ON_START: ${KNOWLEDGE_GRAPH_REBUILD_ON_START:-true}
      KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS: ${KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS:-1800}
      KNOWLEDGE_GRAPH_VECTOR_ENABLED: ${KNOWLEDGE_GRAPH_VECTOR_ENABLED:-true}
      KNOWLEDGE_GRAPH_FULLTEXT_ENABLED: ${KNOWLEDGE_GRAPH_FULLTEXT_ENABLED:-true}
      KNOWLEDGE_GRAPH_TEMPORAL_ENABLED: ${KNOWLEDGE_GRAPH_TEMPORAL_ENABLED:-true}
      KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED: ${KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED:-true}
      KNOWLEDGE_GRAPH_RETRIEVAL_MODE: ${KNOWLEDGE_GRAPH_RETRIEVAL_MODE:-hybrid}
      KNOWLEDGE_GRAPH_RERANKING_ENABLED: ${KNOWLEDGE_GRAPH_RERANKING_ENABLED:-true}
      KNOWLEDGE_GRAPH_MAX_PATH_DEPTH: ${KNOWLEDGE_GRAPH_MAX_PATH_DEPTH:-3}
      KNOWLEDGE_GRAPH_MIN_CONFIDENCE: ${KNOWLEDGE_GRAPH_MIN_CONFIDENCE:-0.35}
      KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS: ${KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS:-45}
      KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER: ${KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_GRAPH_EMBEDDING_MODEL: ${KNOWLEDGE_GRAPH_EMBEDDING_MODEL:-local-hashing-v1}
      POWENS_MANUAL_SYNC_COOLDOWN_SECONDS: ${POWENS_MANUAL_SYNC_COOLDOWN_SECONDS:-300}
      SYNC_STATUS_PERSISTENCE_ENABLED: ${SYNC_STATUS_PERSISTENCE_ENABLED:-true}
      DERIVED_RECOMPUTE_ENABLED: ${DERIVED_RECOMPUTE_ENABLED:-true}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
      AUTH_ADMIN_PASSWORD_HASH_B64: ${AUTH_ADMIN_PASSWORD_HASH_B64:-}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:-}
      AUTH_PASSWORD_HASH_B64: ${AUTH_PASSWORD_HASH_B64:-}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
      AUTH_LOGIN_RATE_LIMIT_PER_MIN: ${AUTH_LOGIN_RATE_LIMIT_PER_MIN:-5}
      AUTH_ALLOW_INSECURE_COOKIE_IN_PROD: ${AUTH_ALLOW_INSECURE_COOKIE_IN_PROD:-false}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:-}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:-}
      POWENS_BASE_URL: ${POWENS_BASE_URL:-}
      POWENS_DOMAIN: ${POWENS_DOMAIN:-}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:-}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:-}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      DRIZZLE_MIGRATIONS_FOLDER: packages/db/drizzle
      HEALTHCHECK_URL: http://127.0.0.1:3001/health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
    networks:
      finance_os_internal:
        aliases:
          - finance-os-api
    healthcheck:
      test: ["CMD", "bun", "infra/docker/healthchecks/http-healthcheck.mjs"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  worker:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-worker:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://finance-os-api:3001}
      WORKER_HEARTBEAT_MS: ${WORKER_HEARTBEAT_MS:-30000}
      WORKER_HEALTHCHECK_FILE: /var/run/finance-os/worker-heartbeat
      WORKER_HEALTHCHECK_MAX_AGE_MS: ${WORKER_HEALTHCHECK_MAX_AGE_MS:-120000}
      WORKER_AUTO_SYNC_ENABLED: ${WORKER_AUTO_SYNC_ENABLED:-false}
      SYNC_STATUS_PERSISTENCE_ENABLED: ${SYNC_STATUS_PERSISTENCE_ENABLED:-true}
      POWENS_SYNC_INTERVAL_MS: ${POWENS_SYNC_INTERVAL_MS:-43200000}
      POWENS_SYNC_MIN_INTERVAL_PROD_MS: ${POWENS_SYNC_MIN_INTERVAL_PROD_MS:-43200000}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:-}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:-}
      POWENS_BASE_URL: ${POWENS_BASE_URL:-}
      POWENS_DOMAIN: ${POWENS_DOMAIN:-}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:-}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:-}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    volumes:
      - worker_run_v2:/var/run/finance-os
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "infra/docker/healthchecks/worker-heartbeat-healthcheck.mjs",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  ops-alerts:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-api:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    command: ["bun", "infra/docker/ops-alerts/monitor.mjs"]
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      ALERTS_ENABLED: ${ALERTS_ENABLED:-false}
      ALERTS_WEBHOOK_URL: ${ALERTS_WEBHOOK_URL:-}
      ALERTS_WEBHOOK_HEADERS_JSON: ${ALERTS_WEBHOOK_HEADERS_JSON:-}
      ALERTS_POLL_INTERVAL_MS: ${ALERTS_POLL_INTERVAL_MS:-30000}
      ALERTS_HTTP_TIMEOUT_MS: ${ALERTS_HTTP_TIMEOUT_MS:-5000}
      ALERTS_5XX_THRESHOLD: ${ALERTS_5XX_THRESHOLD:-3}
      ALERTS_5XX_WINDOW_MS: ${ALERTS_5XX_WINDOW_MS:-300000}
      ALERTS_5XX_PROBE_URLS: ${ALERTS_5XX_PROBE_URLS:-http://web:3000/api/auth/me,http://web:3000/api/dashboard/summary?range=30d}
      ALERTS_HEALTHCHECK_FAILURE_THRESHOLD: ${ALERTS_HEALTHCHECK_FAILURE_THRESHOLD:-2}
      ALERTS_HEALTHCHECK_URLS: ${ALERTS_HEALTHCHECK_URLS:-http://web:3000/healthz,http://finance-os-api:3001/health}
      ALERTS_WORKER_HEARTBEAT_FILE: /var/run/finance-os/worker-heartbeat
      ALERTS_WORKER_STALE_AFTER_MS: ${ALERTS_WORKER_STALE_AFTER_MS:-120000}
      ALERTS_DISK_FREE_PERCENT_THRESHOLD: ${ALERTS_DISK_FREE_PERCENT_THRESHOLD:-10}
      ALERTS_DISK_PATHS: ${ALERTS_DISK_PATHS:-/mnt/postgres,/mnt/redis}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance_os_internal
    volumes:
      - worker_run_v2:/var/run/finance-os:ro
      - postgres_data:/mnt/postgres:ro
      - redis_data:/mnt/redis:ro
    security_opt:
      - no-new-privileges:true

  hermes-agent:
    image: ${HERMES_AGENT_IMAGE:-ghcr.io/nousresearch/hermes-agent:latest}
    profiles:
      - hermes-agent
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      API_SERVER_HOST: 127.0.0.1
      API_SERVER_PORT: ${HERMES_AGENT_PORT:-8080}
      API_SERVER_KEY: ${HERMES_AGENT_API_KEY:-}
      HERMES_GATEWAY_ENABLED: "false"
    command:
      [
        "sh",
        "-lc",
        "if [ -z \"$API_SERVER_KEY\" ]; then echo 'hermes-agent requires HERMES_AGENT_API_KEY' >&2; exit 1; fi; exec hermes api-server --host \"$API_SERVER_HOST\" --port \"$API_SERVER_PORT\" --api-key \"$API_SERVER_KEY\"",
      ]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    security_opt:
      - no-new-privileges:true

  knowledge-service:
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-knowledge-service:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    init: true
    expose:
      - "8011"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_VERSION: ${APP_VERSION:-}
      KNOWLEDGE_SERVICE_ENABLED: ${KNOWLEDGE_SERVICE_ENABLED:-true}
      KNOWLEDGE_GRAPH_BACKEND: ${KNOWLEDGE_GRAPH_BACKEND:-neo4j}
      KNOWLEDGE_GRAPH_STORAGE_PATH: /data/knowledge-graph
      KNOWLEDGE_GRAPH_REBUILD_ON_START: ${KNOWLEDGE_GRAPH_REBUILD_ON_START:-true}
      KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS: ${KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS:-1800}
      KNOWLEDGE_GRAPH_VECTOR_ENABLED: ${KNOWLEDGE_GRAPH_VECTOR_ENABLED:-true}
      KNOWLEDGE_GRAPH_FULLTEXT_ENABLED: ${KNOWLEDGE_GRAPH_FULLTEXT_ENABLED:-true}
      KNOWLEDGE_GRAPH_TEMPORAL_ENABLED: ${KNOWLEDGE_GRAPH_TEMPORAL_ENABLED:-true}
      KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED: ${KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED:-true}
      KNOWLEDGE_GRAPH_RETRIEVAL_MODE: ${KNOWLEDGE_GRAPH_RETRIEVAL_MODE:-hybrid}
      KNOWLEDGE_GRAPH_RERANKING_ENABLED: ${KNOWLEDGE_GRAPH_RERANKING_ENABLED:-true}
      KNOWLEDGE_GRAPH_MAX_PATH_DEPTH: ${KNOWLEDGE_GRAPH_MAX_PATH_DEPTH:-3}
      KNOWLEDGE_GRAPH_MIN_CONFIDENCE: ${KNOWLEDGE_GRAPH_MIN_CONFIDENCE:-0.35}
      KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS: ${KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS:-45}
      KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER: ${KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_GRAPH_EMBEDDING_MODEL: ${KNOWLEDGE_GRAPH_EMBEDDING_MODEL:-local-hashing-v1}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      KNOWLEDGE_USE_PRODUCTION_BACKENDS: ${KNOWLEDGE_USE_PRODUCTION_BACKENDS:-true}
      KNOWLEDGE_REQUIRE_PRODUCTION_BACKENDS_IN_ADMIN: ${KNOWLEDGE_REQUIRE_PRODUCTION_BACKENDS_IN_ADMIN:-true}
      KNOWLEDGE_ALLOW_LOCAL_FALLBACK_IN_ADMIN: ${KNOWLEDGE_ALLOW_LOCAL_FALLBACK_IN_ADMIN:-true}
      KNOWLEDGE_NEO4J_URI: ${KNOWLEDGE_NEO4J_URI:-bolt://neo4j:7687}
      KNOWLEDGE_NEO4J_USER: ${KNOWLEDGE_NEO4J_USER:-${NEO4J_USERNAME:-neo4j}}
      KNOWLEDGE_NEO4J_PASSWORD: ${KNOWLEDGE_NEO4J_PASSWORD:-${NEO4J_PASSWORD:-}}
      KNOWLEDGE_NEO4J_DATABASE: ${KNOWLEDGE_NEO4J_DATABASE:-neo4j}
      KNOWLEDGE_QDRANT_URL: ${KNOWLEDGE_QDRANT_URL:-http://qdrant:6333}
      KNOWLEDGE_QDRANT_API_KEY: ${KNOWLEDGE_QDRANT_API_KEY:-${QDRANT_API_KEY:-}}
      KNOWLEDGE_QDRANT_COLLECTION: ${KNOWLEDGE_QDRANT_COLLECTION:-finance_os_knowledge}
      KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-local-hashing-v1}
      KNOWLEDGE_EMBEDDING_DIMENSIONS: ${KNOWLEDGE_EMBEDDING_DIMENSIONS:-256}
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - finance_os_internal
    volumes:
      - knowledge_graph_data:/data/knowledge-graph
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    security_opt:
      - no-new-privileges:true

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-change-me}"
      NEO4J_dbms_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_dbms_memory_heap_max__size: ${NEO4J_HEAP_MAX:-1G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-512m}
    expose:
      - "7474"
      - "7687"
    volumes:
      - knowledge_neo4j_data:/data
      - knowledge_neo4j_logs:/logs
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - knowledge_qdrant_data:/qdrant/storage
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finance_os}
      POSTGRES_USER: ${POSTGRES_USER:-finance_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1000",
        "--loglevel",
        "warning",
      ]
    volumes:
      - redis_data:/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

networks:
  finance_os_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  worker_run_v2:
  knowledge_graph_data:
  knowledge_neo4j_data:
  knowledge_neo4j_logs:
  knowledge_qdrant_data:
