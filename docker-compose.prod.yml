name: finance-os-prod

# Cap container log files so a noisy service can't fill the host disk.
# Each service: max 5 rotated files of 10 MB = 50 MB per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Resource governance profile for the current single-user VPS shape (~7.6 GiB RAM).
# Dokploy receives this file as raw Docker Compose from the release workflow; verify
# HostConfig after deployment because very old Compose/Docker engines can differ.
x-resource-web: &resource-web
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
        pids: 128
      reservations:
        memory: 64M

x-resource-api: &resource-api
  deploy:
    resources:
      limits:
        cpus: "1.50"
        memory: 1280M
        pids: 256
      reservations:
        memory: 384M

x-resource-worker: &resource-worker
  deploy:
    resources:
      limits:
        cpus: "1.25"
        memory: 1024M
        pids: 256
      reservations:
        memory: 256M

x-resource-ops-alerts: &resource-ops-alerts
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: 256M
        pids: 128
      reservations:
        memory: 64M

x-resource-knowledge-service: &resource-knowledge-service
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 512M
        pids: 128
      reservations:
        memory: 128M

x-resource-quant-service: &resource-quant-service
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 512M
        pids: 128
      reservations:
        memory: 128M

x-resource-neo4j: &resource-neo4j
  deploy:
    resources:
      limits:
        cpus: "1.50"
        memory: 2048M
        pids: 256
      reservations:
        memory: 1024M

x-resource-qdrant: &resource-qdrant
  deploy:
    resources:
      limits:
        cpus: "0.75"
        memory: 768M
        pids: 128
      reservations:
        memory: 256M

x-resource-postgres: &resource-postgres
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 1024M
        pids: 256
      reservations:
        memory: 512M

x-resource-redis: &resource-redis
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
        pids: 128
      reservations:
        memory: 96M

services:
  web:
    <<: *resource-web
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-web:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=64m
    cap_drop:
      - ALL
    # Public entrypoint: browser traffic hits `web`, and Nitro proxies `/api/*`
    # to the API through a unique internal DNS alias. Avoid the generic `api`
    # hostname because Dokploy can attach multiple stacks to shared networks.
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_URL: ${APP_URL:-}
      WEB_URL: ${WEB_URL:-}
      API_URL: ${API_URL:-}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      HEALTHCHECK_URL: http://127.0.0.1:3000/healthz
      API_INTERNAL_URL: http://finance-os-api:3001
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
      VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-finance-os}
      VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED: ${VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED:-true}
      VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS: ${VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS:-300}
      VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED: ${VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED:-true}
      VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED: ${VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED:-true}
      VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED: ${VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED:-true}
      VITE_AI_ADVISOR_ENABLED: ${VITE_AI_ADVISOR_ENABLED:-true}
      VITE_AI_ADVISOR_ADMIN_ONLY: ${VITE_AI_ADVISOR_ADMIN_ONLY:-false}
      VITE_UI_RECONNECT_BANNER_ENABLED: ${VITE_UI_RECONNECT_BANNER_ENABLED:-true}
      VITE_PWA_NOTIFICATIONS_ENABLED: ${VITE_PWA_NOTIFICATIONS_ENABLED:-true}
      VITE_PWA_CRITICAL_ENABLED: ${VITE_PWA_CRITICAL_ENABLED:-true}
      VITE_LEARNING_LOOP_UI_ENABLED: ${VITE_LEARNING_LOOP_UI_ENABLED:-true}
      VITE_SOCIAL_BENCHMARK_EXPLAINABILITY_ENABLED: ${VITE_SOCIAL_BENCHMARK_EXPLAINABILITY_ENABLED:-true}
      VITE_CTA_POLICY_REGISTRY_V1: ${VITE_CTA_POLICY_REGISTRY_V1:-true}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_DEBUG: ${APP_DEBUG:-0}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    healthcheck:
      test: ["CMD", "node", "infra/docker/healthchecks/http-healthcheck.mjs"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  api:
    <<: *resource-api
    image: ${GHCR_IMAGE_NAME:?GHCR_IMAGE_NAME is required}-api:${APP_IMAGE_TAG:?APP_IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m
    cap_drop:
      - ALL
    # Internal-only service. Public `/api/*` requests are expected to go
    # through `web:3000`, which proxies them to this container.
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: ${TZ:-UTC}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_URL: ${APP_URL:-}
      WEB_URL: ${WEB_URL:-}
      API_URL: ${API_URL:-}
      APP_VERSION: ${APP_VERSION:-}
      APP_COMMIT_SHA: ${APP_COMMIT_SHA:-}
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      DEBUG_METRICS_TOKEN: ${DEBUG_METRICS_TOKEN:-}
      KNOWLEDGE_SERVICE_ENABLED: ${KNOWLEDGE_SERVICE_ENABLED:-false}
      KNOWLEDGE_SERVICE_URL: ${KNOWLEDGE_SERVICE_URL:-http://knowledge-service:8011}
      KNOWLEDGE_SERVICE_TIMEOUT_MS: ${KNOWLEDGE_SERVICE_TIMEOUT_MS:-2500}
      KNOWLEDGE_GRAPH_BACKEND: ${KNOWLEDGE_GRAPH_BACKEND:-neo4j}
      KNOWLEDGE_GRAPH_STORAGE_PATH: ${KNOWLEDGE_GRAPH_STORAGE_PATH:-/data/knowledge-graph}
      KNOWLEDGE_GRAPH_REBUILD_ON_START: ${KNOWLEDGE_GRAPH_REBUILD_ON_START:-true}
      KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS: ${KNOWLEDGE_GRAPH_MAX_CONTEXT_TOKENS:-1800}
      KNOWLEDGE_GRAPH_VECTOR_ENABLED: ${KNOWLEDGE_GRAPH_VECTOR_ENABLED:-true}
      KNOWLEDGE_GRAPH_FULLTEXT_ENABLED: ${KNOWLEDGE_GRAPH_FULLTEXT_ENABLED:-true}
      KNOWLEDGE_GRAPH_TEMPORAL_ENABLED: ${KNOWLEDGE_GRAPH_TEMPORAL_ENABLED:-true}
      KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED: ${KNOWLEDGE_GRAPH_DEMO_FIXTURES_ENABLED:-true}
      KNOWLEDGE_GRAPH_RETRIEVAL_MODE: ${KNOWLEDGE_GRAPH_RETRIEVAL_MODE:-hybrid}
      KNOWLEDGE_GRAPH_RERANKING_ENABLED: ${KNOWLEDGE_GRAPH_RERANKING_ENABLED:-true}
      KNOWLEDGE_GRAPH_MAX_PATH_DEPTH: ${KNOWLEDGE_GRAPH_MAX_PATH_DEPTH:-3}
      KNOWLEDGE_GRAPH_MIN_CONFIDENCE: ${KNOWLEDGE_GRAPH_MIN_CONFIDENCE:-0.35}
      KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS: ${KNOWLEDGE_GRAPH_RECENCY_HALF_LIFE_DAYS:-45}
      KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER: ${KNOWLEDGE_GRAPH_EMBEDDING_PROVIDER:-local}
      KNOWLEDGE_GRAPH_EMBEDDING_MODEL: ${KNOWLEDGE_GRAPH_EMBEDDING_MODEL:-local-hashing-v1}
      QUANT_SERVICE_ENABLED: ${QUANT_SERVICE_ENABLED:-false}
      QUANT_SERVICE_URL: ${QUANT_SERVICE_URL:-http://quant-service:8012}
      QUANT_SERVICE_TIMEOUT_MS: ${QUANT_SERVICE_TIMEOUT_MS:-30000}
      TRADING_LAB_ENABLED: ${TRADING_LAB_ENABLED:-true}
      TRADING_LAB_PAPER_ONLY: ${TRADING_LAB_PAPER_ONLY:-true}
      POWENS_MANUAL_SYNC_COOLDOWN_SECONDS: ${POWENS_MANUAL_SYNC_COOLDOWN_SECONDS:-300}
      SYNC_STATUS_PERSISTENCE_ENABLED: ${SYNC_STATUS_PERSISTENCE_ENABLED:-true}
      DERIVED_RECOMPUTE_ENABLED: ${DERIVED_RECOMPUTE_ENABLED:-true}
      AUTH_ADMIN_EMAIL: ${AUTH_ADMIN_EMAIL:-}
      AUTH_ADMIN_PASSWORD_HASH_B64: ${AUTH_ADMIN_PASSWORD_HASH_B64:-}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:-}
      AUTH_PASSWORD_HASH_B64: ${AUTH_PASSWORD_HASH_B64:-}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-30}
      AUTH_LOGIN_RATE_LIMIT_PER_MIN: ${AUTH_LOGIN_RATE_LIMIT_PER_MIN:-5}
      AUTH_ALLOW_INSECURE_COOKIE_IN_PROD: ${AUTH_ALLOW_INSECURE_COOKIE_IN_PROD:-false}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:-}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:-}
      POWENS_BASE_URL: ${POWENS_BASE_URL:-}
      POWENS_DOMAIN: ${POWENS_DOMAIN:-}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:-}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:-}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      DRIZZLE_MIGRATIONS_FOLDER: packages/db/drizzle
      HEALTHCHECK_URL: http://127.0.0.1:3001/health
      # --- Runtime feature flags & provider credentials ----------------------
      # IMPORTANT: every flag/secret consumed by API routes at runtime MUST be
      # listed here. Variables that exist in Dokploy `.env` but are missing
      # from this block are NOT injected into the container even when the
      # zod schema defines them — they silently fall back to schema defaults
      # (often disabling features), which produces logs such as:
      #   "dashboard markets refresh failed: MARKET_PROVIDER_UNAVAILABLE"
      #   "transaction categorization rolloutPercent=0 fallback_rate=1"
      # See scripts/check-compose-env-parity.ts for the automated guard.
      EXTERNAL_INTEGRATIONS_SAFE_MODE: ${EXTERNAL_INTEGRATIONS_SAFE_MODE:-false}
      DEMO_DATASET_STRATEGY: ${DEMO_DATASET_STRATEGY:-v1}
      DEMO_PERSONA_MATCHING_ENABLED: ${DEMO_PERSONA_MATCHING_ENABLED:-true}
      TRANSACTIONS_SNAPSHOT_FIRST_ENABLED: ${TRANSACTIONS_SNAPSHOT_FIRST_ENABLED:-true}
