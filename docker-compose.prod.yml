name: finance-os-prod

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: web
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-finance-os}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_PRIVATE_ACCESS_TOKEN: ${VITE_PRIVATE_ACCESS_TOKEN:-}
    restart: unless-stopped
    init: true
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      APP_URL: ${APP_URL:?APP_URL is required}
      WEB_URL: ${WEB_URL:?WEB_URL is required}
      API_URL: ${API_URL:?API_URL is required}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      HEALTHCHECK_URL: http://127.0.0.1:3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    healthcheck:
      test: ['CMD', 'node', 'infra/docker/healthchecks/http-healthcheck.mjs']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: api
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
    restart: unless-stopped
    init: true
    expose:
      - '3001'
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      APP_URL: ${APP_URL:?APP_URL is required}
      WEB_URL: ${WEB_URL:?WEB_URL is required}
      API_URL: ${API_URL:?API_URL is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      PRIVATE_ACCESS_TOKEN: ${PRIVATE_ACCESS_TOKEN:-}
      DEBUG_METRICS_TOKEN: ${DEBUG_METRICS_TOKEN:-}
      POWENS_MANUAL_SYNC_COOLDOWN_SECONDS: ${POWENS_MANUAL_SYNC_COOLDOWN_SECONDS:-300}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:?POWENS_CLIENT_ID is required}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:?POWENS_CLIENT_SECRET is required}
      POWENS_BASE_URL: ${POWENS_BASE_URL:?POWENS_BASE_URL is required}
      POWENS_DOMAIN: ${POWENS_DOMAIN:?POWENS_DOMAIN is required}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:?POWENS_REDIRECT_URI_DEV is required}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:?POWENS_REDIRECT_URI_PROD is required}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
      DRIZZLE_MIGRATIONS_FOLDER: packages/db/drizzle
      HEALTHCHECK_URL: http://127.0.0.1:3001/health
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance_os_internal
    healthcheck:
      test: ['CMD', 'bun', 'infra/docker/healthchecks/http-healthcheck.mjs']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: worker
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      WORKER_HEARTBEAT_MS: ${WORKER_HEARTBEAT_MS:-30000}
      WORKER_HEALTHCHECK_FILE: /tmp/worker-heartbeat
      WORKER_HEALTHCHECK_MAX_AGE_MS: ${WORKER_HEALTHCHECK_MAX_AGE_MS:-120000}
      POWENS_SYNC_INTERVAL_MS: ${POWENS_SYNC_INTERVAL_MS:-43200000}
      POWENS_SYNC_MIN_INTERVAL_PROD_MS: ${POWENS_SYNC_MIN_INTERVAL_PROD_MS:-43200000}
      POWENS_CLIENT_ID: ${POWENS_CLIENT_ID:?POWENS_CLIENT_ID is required}
      POWENS_CLIENT_SECRET: ${POWENS_CLIENT_SECRET:?POWENS_CLIENT_SECRET is required}
      POWENS_BASE_URL: ${POWENS_BASE_URL:?POWENS_BASE_URL is required}
      POWENS_DOMAIN: ${POWENS_DOMAIN:?POWENS_DOMAIN is required}
      POWENS_REDIRECT_URI_DEV: ${POWENS_REDIRECT_URI_DEV:?POWENS_REDIRECT_URI_DEV is required}
      POWENS_REDIRECT_URI_PROD: ${POWENS_REDIRECT_URI_PROD:?POWENS_REDIRECT_URI_PROD is required}
      POWENS_WEBVIEW_BASE_URL: ${POWENS_WEBVIEW_BASE_URL:-https://webview.powens.com/connect}
      POWENS_WEBVIEW_URL: ${POWENS_WEBVIEW_URL:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - finance_os_internal
    healthcheck:
      test: ['CMD', 'bun', 'infra/docker/healthchecks/worker-heartbeat-healthcheck.mjs']
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1000', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    networks:
      - finance_os_internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  finance_os_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
