      AI_ANTHROPIC_BASE_URL: ${AI_ANTHROPIC_BASE_URL:-}
      AI_ANTHROPIC_CHALLENGER_MODEL: ${AI_ANTHROPIC_CHALLENGER_MODEL:-claude-sonnet-4-6}
      AI_USD_TO_EUR_RATE: ${AI_USD_TO_EUR_RATE:-0.92}
      AI_BUDGET_DAILY_USD: ${AI_BUDGET_DAILY_USD:-2}
      AI_BUDGET_MONTHLY_USD: ${AI_BUDGET_MONTHLY_USD:-40}
      AI_BUDGET_DISABLE_CHALLENGER_RATIO: ${AI_BUDGET_DISABLE_CHALLENGER_RATIO:-0.75}
      AI_BUDGET_DISABLE_DEEP_ANALYSIS_RATIO: ${AI_BUDGET_DISABLE_DEEP_ANALYSIS_RATIO:-0.5}
      AI_SPEND_ALERT_DAILY_THRESHOLD_PCT: ${AI_SPEND_ALERT_DAILY_THRESHOLD_PCT:-0.8}
      AI_SPEND_ALERT_MONTHLY_THRESHOLD_PCT: ${AI_SPEND_ALERT_MONTHLY_THRESHOLD_PCT:-0.8}
