      AI_KNOWLEDGE_QA_RETRIEVAL_ENABLED: ${AI_KNOWLEDGE_QA_RETRIEVAL_ENABLED:-true}
      ENRICHMENT_BULK_TRIAGE_ENABLED: ${ENRICHMENT_BULK_TRIAGE_ENABLED:-true}
