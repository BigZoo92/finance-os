services:
  web:
    image: finance-os-web:prod
    pull_policy: never
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: web
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://finance-os-api:3001}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-finance-os}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED: ${VITE_POWENS_SYNC_COOLDOWN_UI_ENABLED:-true}
        VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS: ${VITE_POWENS_SYNC_COOLDOWN_UI_SECONDS:-300}
        VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED: ${VITE_DASHBOARD_HEALTH_SIGNALS_ENABLED:-true}
        VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED: ${VITE_DASHBOARD_HEALTH_GLOBAL_INDICATOR_ENABLED:-true}
        VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED: ${VITE_DASHBOARD_HEALTH_WIDGET_BADGES_ENABLED:-true}
        GIT_SHA: ${GIT_SHA:-local}
        GIT_TAG: ${GIT_TAG:-local}
        BUILD_TIME: ${BUILD_TIME:-local}

  api:
    image: finance-os-api:prod
    pull_policy: never
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: api
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
        GIT_SHA: ${GIT_SHA:-local}
        GIT_TAG: ${GIT_TAG:-local}
        BUILD_TIME: ${BUILD_TIME:-local}

  worker:
    image: finance-os-worker:prod
    pull_policy: never
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: worker
      args:
        NODE_VERSION: ${NODE_VERSION:-22.15.0}
        BUN_VERSION: ${BUN_VERSION:-1.2.22}
        PNPM_VERSION: ${PNPM_VERSION:-10.15.0}
        GIT_SHA: ${GIT_SHA:-local}
        GIT_TAG: ${GIT_TAG:-local}
        BUILD_TIME: ${BUILD_TIME:-local}

  knowledge-service:
    image: finance-os-knowledge-service:prod
    pull_policy: never
    build:
      context: apps/knowledge-service
      dockerfile: Dockerfile
